# Hard gates for AGENTS.md Law 7 (and Law 1 where covered by Vitest).
# Fails the check run — does not auto-comment; see claude-review.yml for narrative flags.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (root)
        run: npm ci

      - name: Build (root)
        run: npm run build

      - name: Test (Vitest)
        run: npx vitest run

      - name: Install (web)
        working-directory: web
        run: npm ci

      - name: Build (web)
        working-directory: web
        run: npm run build
