name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff against main
        run: |
          git fetch origin main
          git diff origin/main...HEAD -- . ':(exclude)package-lock.json' | head -c 50000 > /tmp/pr_diff.txt

      - name: Call Claude API
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 -c "
          import json, os, urllib.error, urllib.request

          diff = open('/tmp/pr_diff.txt').read()
          system_prompt = """You are reviewing PRs for Sunny, a voice AI tutoring app for children with IEPs. You have deep context on this system.

ALWAYS check for these specific failure modes:

1. PROMPT VS CODE: Is this solving a problem in TypeScript that should be solved in a companion markdown prompt file? If the PR adds logic that encodes teaching behavior, curriculum order, or pedagogical rules in code instead of prompts, flag it and recommend the prompt fix instead.

2. ADAPTIVE TEACHING: Does this PR make Elli more rigid or more flexible? Any change that locks Elli into a fixed script or execution order is a regression — she must be able to adapt to the child in real time.

3. STATE MACHINE RISK: Does this touch session-manager.ts, useSession.ts, or Canvas.tsx? Flag any change that could affect PROCESSING → CANVAS_PENDING → SPEAKING transitions.

4. LATENCY: Does this add synchronous operations, sequential tool calls, or new network hops in the hot path?

5. CHILD SAFETY: Does this affect what Elli or Matilda says to children? Flag any prompt changes that could produce inappropriate responses.

6. BROKEN MATH: If this PR contains arithmetic algorithms, verify them with concrete examples including edge cases like borrowing cascades (305-47), carrying in addition (78+45), and zero in subtrahend.

Be direct. If the PR should be closed and replaced with a prompt edit, say so explicitly. Cite file names and line numbers where relevant. Use markdown formatting."""
          payload = json.dumps({
            'model': 'claude-sonnet-4-5',
            'max_tokens': 2048,
            'system': system_prompt,
            'messages': [{'role': 'user', 'content': 'Review this pull request diff and provide feedback:\n\n```diff\n' + diff + '\n```'}]
          })
          req = urllib.request.Request(
            'https://api.anthropic.com/v1/messages',
            data=payload.encode(),
            headers={
              'x-api-key': os.environ['ANTHROPIC_API_KEY'],
              'anthropic-version': '2023-06-01',
              'content-type': 'application/json'
            }
          )
          try:
            resp = urllib.request.urlopen(req)
            text = json.loads(resp.read())['content'][0]['text']
          except urllib.error.HTTPError as e:
            body = e.read().decode()
            text = 'Claude review failed: ' + json.loads(body).get('error', {}).get('message', body)
          except Exception as e:
            text = 'Claude review failed: ' + str(e)
          open('/tmp/review.txt', 'w').write(text)
          "

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('/tmp/review.txt', 'utf8');
            const review = '## Claude Review\n\n' + reviewText;

            // Find and delete any previous Claude review comment on this PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const previous = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Claude Review')
            );

            if (previous) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review,
            });
