name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff against main
        run: |
          git fetch origin main
          git diff origin/main...HEAD -- . ':(exclude)package-lock.json' | head -c 50000 > /tmp/pr_diff.txt

      - name: Call Claude API
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 -c "
          import json, os, urllib.error, urllib.request

          diff = open('/tmp/pr_diff.txt').read()
          payload = json.dumps({
            'model': 'claude-sonnet-4-5',
            'max_tokens': 1024,
            'system': 'You are reviewing PRs for Sunny, a voice AI tutoring app for children. Flag: latency regressions, state machine risks, session-manager.ts changes that could break Ila or Reina\\'s sessions, prompt changes in companions/, and missing error handling. Be concise and specific — cite file names and line context where relevant. Use markdown formatting for your response.',
            'messages': [{'role': 'user', 'content': 'Review this pull request diff and provide feedback:\n\n\`\`\`diff\n' + diff + '\n\`\`\`'}]
          })
          req = urllib.request.Request(
            'https://api.anthropic.com/v1/messages',
            data=payload.encode(),
            headers={
              'x-api-key': os.environ['ANTHROPIC_API_KEY'],
              'anthropic-version': '2023-06-01',
              'content-type': 'application/json'
            }
          )
          try:
            resp = urllib.request.urlopen(req)
            text = json.loads(resp.read())['content'][0]['text']
          except urllib.error.HTTPError as e:
            body = e.read().decode()
            text = 'Claude review failed: ' + json.loads(body).get('error', {}).get('message', body)
          except Exception as e:
            text = 'Claude review failed: ' + str(e)
          open('/tmp/review.txt', 'w').write(text)
          "

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('/tmp/review.txt', 'utf8');
            const review = '## Claude Review\n\n' + reviewText;

            // Find and delete any previous Claude review comment on this PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const previous = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## Claude Review')
            );

            if (previous) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review,
            });
