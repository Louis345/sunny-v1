<!DOCTYPE html>
<html lang="en">
<head>
  <script src="_contract.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Builder</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0e0e12;
      color: #f4f4f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
    }
    .words { font-size: 1.25rem; letter-spacing: 0.04em; text-align: center; max-width: 28rem; }
    .progress { font-size: 0.95rem; color: #a1a1aa; }
    button {
      padding: 0.65rem 1.2rem;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      background: #22c55e;
      color: #052e16;
    }
    button.secondary { background: #f97316; color: #1c0a01; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="words" id="word-line"></div>
  <div class="progress" id="progress-line"></div>
  <div>
    <button type="button" id="done-word">Done with this word</button>
  </div>
  <div>
    <button type="button" id="done-ok">Finish (success)</button>
    <button type="button" class="secondary" id="done-bad">Finish (struggle)</button>
  </div>
  <script>
    (function () {
      var words = (window.GAME_PARAMS && window.GAME_PARAMS.words ? window.GAME_PARAMS.words : []).slice();
      var _childId = (window.GAME_PARAMS && window.GAME_PARAMS.childId) || "unknown";
      var _difficulty = (window.GAME_PARAMS && window.GAME_PARAMS.difficulty) || 2;
      var _nodeId = (window.GAME_PARAMS && window.GAME_PARAMS.nodeId) || "node_unknown";
      if (words.length === 0) words = ["practice"];
      var wordIndex = 0;

      function renderLine() {
        document.getElementById("word-line").textContent =
          "Current word: " + (words[wordIndex] || "") + " — (" + (wordIndex + 1) + " / " + words.length + ")";
        document.getElementById("progress-line").textContent =
          words.length > 1
            ? "Build each word, then tap “Finish (success)” on the last one."
            : "Tap Done when ready, then Finish.";
      }
      renderLine();

      if (window.GameBridge && typeof window.GameBridge.reportState === "function") {
        window.GameBridge.reportState(
          'Word builder — ' + words.length + ' word' + (words.length !== 1 ? 's' : '') + ' to build: ' + words.join(', '),
          {
            phase: "playing",
            currentWord: words[0] || "",
            itemIndex: 0,
            totalItems: words.length,
          }
        );
      }

      function sendResult(completed, accuracy) {
        sendNodeComplete({
          completed: completed,
          accuracy: accuracy,
          flaggedWords: [],
          xpEarned: Math.round(accuracy * 10),
          timeSpent_ms: 1200,
          wordsAttempted: words.length,
        });
        if (completed && window.GameBridge && typeof window.GameBridge.fireEvent === "function") {
          window.setTimeout(function () {
            window.GameBridge.fireEvent("session_complete", {});
          }, 0);
        } else if (typeof window.fireCompanionEvent === "function") {
          window.fireCompanionEvent("session_complete", {});
        }
      }

      document.getElementById("done-word").addEventListener("click", function () {
        if (wordIndex >= words.length - 1) return;
        wordIndex += 1;
        renderLine();
        if (window.GameBridge && typeof window.GameBridge.reportState === "function") {
          window.GameBridge.reportState(
            'Word builder — working on: ' + (words[wordIndex] || ""),
            {
              phase: "playing",
              currentWord: words[wordIndex] || "",
              itemIndex: wordIndex,
              totalItems: words.length,
            }
          );
        }
      });

      document.getElementById("done-ok").addEventListener("click", function () {
        if (wordIndex < words.length - 1) {
          return;
        }
        if (window.GameBridge && typeof window.GameBridge.reportState === "function") {
          window.GameBridge.reportState(
            'Word builder complete — all words built successfully',
            { phase: "complete", correct: true, totalItems: words.length }
          );
        }
        sendResult(true, 1);
      });
      document.getElementById("done-bad").addEventListener("click", function () {
        if (window.GameBridge && typeof window.GameBridge.reportState === "function") {
          window.GameBridge.reportState(
            'Word builder ended — struggled with some words',
            { phase: "complete", correct: false, totalItems: words.length }
          );
        }
        sendResult(false, 0.25);
      });
    })();
  </script>
</body>
</html>
