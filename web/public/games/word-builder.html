<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Builder</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0e0e12;
      color: #f4f4f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 1rem;
    }
    .words { font-size: 1.25rem; letter-spacing: 0.04em; }
    button {
      padding: 0.65rem 1.2rem;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      background: #22c55e;
      color: #052e16;
    }
    button.secondary { background: #f97316; color: #1c0a01; }
  </style>
</head>
<body>
  <div class="words" id="word-line"></div>
  <div>
    <button type="button" id="done-ok">Finish (success)</button>
    <button type="button" class="secondary" id="done-bad">Finish (struggle)</button>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var nodeId = params.get("nodeId") || "node_unknown";
      var rawWords = params.get("words") || "practice";
      var words = rawWords.split(",").map(function (w) { return w.trim(); }).filter(Boolean);
      if (words.length === 0) words = ["practice"];
      document.getElementById("word-line").textContent = "Words: " + words.join(", ");

      function sendResult(completed, accuracy) {
        if (!window.parent) return;
        window.parent.postMessage(
          {
            type: "node_result",
            nodeId: nodeId,
            completed: completed,
            accuracy: accuracy,
            timeSpent_ms: 1200,
            wordsAttempted: words.length,
          },
          "*",
        );
      }

      document.getElementById("done-ok").addEventListener("click", function () {
        sendResult(true, 1);
      });
      document.getElementById("done-bad").addEventListener("click", function () {
        sendResult(false, 0.25);
      });
    })();
  </script>
</body>
</html>
