<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wordd Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#12002e;font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px 14px;gap:10px;overflow:hidden;position:relative}
.starfield{position:absolute;inset:0;pointer-events:none;z-index:0}
.s{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,2s) var(--dl,0s) infinite alternate ease-in-out}
@keyframes tw{from{opacity:0.1;transform:scale(0.7)}to{opacity:0.9;transform:scale(1.3)}}
.shooting{position:absolute;width:80px;height:2px;background:linear-gradient(90deg,transparent,#fff,transparent);border-radius:2px;animation:shoot 3.5s linear infinite;opacity:0}
@keyframes shoot{0%{opacity:0;transform:translateX(-100px) translateY(0) rotate(-25deg)}10%{opacity:1}40%{opacity:0;transform:translateX(300px) translateY(80px) rotate(-25deg)}100%{opacity:0}}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:440px}
.top-row{display:flex;align-items:flex-start;justify-content:space-between;width:100%}
.brand{display:flex;flex-direction:column;gap:1px}
.brand-title{font-size:26px;font-weight:900;color:#FFD93D;letter-spacing:0.04em;text-shadow:0 3px 0 #8a6a00;line-height:1}
.brand-sub{color:#b89dff;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase}
.level-card{background:#2a0a5e;border:2.5px solid #7F77DD;border-radius:14px;padding:6px 14px;display:flex;flex-direction:column;align-items:center;min-width:60px;animation:lp 2.5s ease-in-out infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(127,119,221,0)}50%{box-shadow:0 0 0 6px rgba(127,119,221,0.25)}}
.level-num{color:#FFD93D;font-size:24px;font-weight:900;line-height:1;text-shadow:0 2px 0 #8a6a00}
.level-lbl{color:#9f8fdd;font-size:9px;font-weight:700;letter-spacing:0.12em}
.pstar{width:24px;height:24px;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.pstar.lit{background:#FFD93D;filter:drop-shadow(0 0 4px #FFD93D)}
.pstar.dim{background:#2a0a5e;outline:2px solid #3d1a7a;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.stars-row{display:flex;gap:5px;justify-content:center}
.progress-bar{width:100%;height:8px;background:#2a0a5e;border-radius:4px;overflow:hidden;border:1px solid #3d1a7a}
.progress-fill{height:100%;width:0%;border-radius:4px;background:#7F77DD;transition:width 0.5s ease;position:relative;overflow:hidden}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:sh 1.5s linear infinite;transform:translateX(-100%)}
@keyframes sh{to{transform:translateX(200%)}}
.hint-box{background:#1e0848;border:2px solid #534AB7;border-radius:14px;padding:8px 14px;width:100%;display:flex;align-items:center;gap:10px}
.hint-orb{width:32px;height:32px;background:#7F77DD;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;animation:op 2s ease-in-out infinite}
@keyframes op{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hint-text{color:#d0b8ff;font-size:12px;line-height:1.4;font-weight:700}
.hint-text em{color:#FFD93D;font-style:normal}
.tiles-row{display:flex;gap:5px;justify-content:center;width:100%}
.tile{width:50px;height:56px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;text-transform:uppercase;flex-shrink:0;transition:transform 0.15s}
.tile.known{background:#534AB7;border:3px solid #AFA9EC;color:#fff;text-shadow:0 1px 0 #26215C}
.tile.blank{background:#1e0848;border:3px dashed #534AB7}
.tile.filled{background:#3C3489;border:3px solid #FFD93D;color:#FFD93D;transform:scale(1.06);animation:ti 0.15s ease-out}
@keyframes ti{from{transform:scale(0.85)}to{transform:scale(1.06)}}
.tile.correct{background:#1D9E75;border:3px solid #9FE1CB;color:#fff;animation:cp 0.4s ease-out forwards}
@keyframes cp{0%{transform:scale(0.8) rotate(-3deg)}50%{transform:scale(1.2) rotate(2deg)}100%{transform:scale(1) rotate(0)}}
.tile.wrong{background:#A32D2D;border:3px solid #F09595;color:#fff;animation:ws 0.4s ease-out}
@keyframes ws{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.keyboard{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.kb-row{display:flex;gap:4px;justify-content:center}
.key{height:46px!important;min-width:34px!important;border-radius:8px!important;border:none!important;font-size:16px!important;font-weight:900!important;cursor:pointer!important;display:flex!important;align-items:center!important;justify-content:center!important;text-transform:uppercase!important;padding:0 8px!important;font-family:inherit!important;position:relative!important;top:0!important;transition:transform 0.08s,box-shadow 0.08s!important;background:#ffffff!important;color:#12002e!important;box-shadow:0 4px 0 #888!important}
.key:hover{filter:brightness(0.88)!important}
.key:active{transform:translateY(3px)!important;box-shadow:0 1px 0 #888!important;top:2px!important}
.key.enter-key{background:#FFD93D!important;color:#12002e!important;min-width:54px!important;font-size:11px!important;box-shadow:0 4px 0 #8a6a00!important}
.key.del-key{background:#e74c3c!important;color:#ffffff!important;min-width:54px!important;font-size:11px!important;box-shadow:0 4px 0 #7a1f1f!important}
.key.used{background:#2d1060!important;color:#6040a0!important;box-shadow:0 2px 0 #1e0848!important;cursor:default!important}
.key.lit{background:#1D9E75!important;color:#ffffff!important;box-shadow:0 4px 0 #0a5a40!important;animation:kg 2s ease-in-out infinite!important}
@keyframes kg{0%,100%{box-shadow:0 4px 0 #0a5a40}50%{box-shadow:0 4px 10px #1D9E75,0 4px 0 #0a5a40}}
.bottom-row{display:flex;align-items:flex-end;justify-content:space-between;width:100%;gap:8px}
.elli-wrap{display:flex;flex-direction:column;gap:4px;flex:1}
.elli-label{color:#9f8fdd!important;font-size:10px;font-weight:700;letter-spacing:0.1em;padding-left:4px}
.elli-bubble{background:#1e0848;border:2px solid #534AB7;border-radius:14px 14px 14px 2px;padding:7px 12px;color:#d0b8ff!important;font-size:12px;font-style:italic;font-weight:700;line-height:1.4;animation:bp 4s ease-in-out infinite;min-height:38px}
@keyframes bp{0%,100%{border-color:#534AB7}50%{border-color:#7F77DD}}
.elli-bubble strong{color:#FFD93D!important;font-style:normal}
.score-card{background:#1e0848;border:2.5px solid #FFD93D;border-radius:14px;padding:6px 14px;display:flex;flex-direction:column;align-items:center;min-width:62px;animation:sg 3s ease-in-out infinite}
@keyframes sg{0%,100%{box-shadow:0 0 0 0 rgba(255,217,61,0)}50%{box-shadow:0 0 8px 2px rgba(255,217,61,0.3)}}
.score-num{color:#FFD93D!important;font-size:22px;font-weight:900;line-height:1;text-shadow:0 2px 0 #8a6a00}
.score-lbl{color:#b89d5a!important;font-size:9px;font-weight:700;letter-spacing:0.1em}
.overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:50;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:14px}
.overlay.show{display:flex}
.overlay-title{font-size:28px;font-weight:900;color:#FFD93D;text-shadow:0 2px 0 #8a6a00}
.overlay-sub{color:#d0b8ff;font-size:13px;text-align:center;max-width:260px;font-weight:700}
</style>
</head>
<body>
<div class="starfield" id="sf"></div>
<div class="wrap" id="mainwrap">
  <div class="top-row">
    <div class="brand">
      <div class="brand-title">Wordd Builder</div>
      <div class="brand-sub" id="player-name">fill the missing letters</div>
    </div>
    <div class="level-card">
      <div class="level-num" id="level-num">1</div>
      <div class="level-lbl">LEVEL</div>
    </div>
  </div>
  <div class="stars-row" id="stars-row">
    <div class="pstar lit" id="star0"></div>
    <div class="pstar dim" id="star1"></div>
    <div class="pstar dim" id="star2"></div>
    <div class="pstar dim" id="star3"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
  <div class="hint-box">
    <div class="hint-orb">?</div>
    <div class="hint-text" id="hint-text">Waiting for your word...</div>
  </div>
  <div class="tiles-row" id="tiles-row"></div>
  <div class="keyboard" id="keyboard">
    <div class="kb-row" id="kb0"></div>
    <div class="kb-row" id="kb1"></div>
    <div class="kb-row" id="kb2"></div>
  </div>
  <div class="bottom-row">
    <div class="elli-wrap">
      <div class="elli-label">ELLI SAYS</div>
      <div class="elli-bubble" id="elli-bubble">I have <strong>NO idea</strong> what this word is... do you?</div>
    </div>
    <div class="score-card">
      <div class="score-num" id="score-num">0</div>
      <div class="score-lbl">POINTS</div>
    </div>
  </div>
  <div class="overlay" id="overlay">
    <div class="overlay-title" id="ov-title"></div>
    <div class="overlay-sub" id="ov-sub"></div>
  </div>
</div>
<script>
const sf=document.getElementById('sf');
for(let i=0;i<55;i++){const s=document.createElement('div');s.className='s';const sz=Math.random()*3+1.5;s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${1.5+Math.random()*2.5}s;--dl:${Math.random()*3}s;opacity:${0.2+Math.random()*0.6}`;sf.appendChild(s)}
for(let i=0;i<3;i++){const sh=document.createElement('div');sh.className='shooting';sh.style.cssText=`left:${Math.random()*60}%;top:${Math.random()*40}%;animation-delay:${i*1.2+Math.random()}s`;sf.appendChild(sh)}

let secretWord='',wordLength=0,round=1,score=0,playerName='Student';
let blankedPositions=[],currentInput=[];
const hints=['Look carefully — most letters are shown!','Some letters are hiding — can you find them?','Only the vowels are missing now!','You know this word — spell it from memory!'];
const elliLines=['I have <strong>NO idea</strong> what this word is... do you?',"Hmm... I'm thinking... I can't figure it out!",'Wait... is it... no... help me out here!','You totally know this one. I am stumped.'];

function postToParent(data){window.parent.postMessage(data,'*')}

window.addEventListener('message',e=>{
  const msg=e.data;
  if(!msg?.type)return;
  if(msg.type==='start'){
    secretWord=msg.word.toLowerCase();
    wordLength=secretWord.length;
    round=msg.round??1;
    playerName=msg.playerName??'Student';
    score=msg.score??0;
    document.getElementById('player-name').textContent=playerName;
    document.getElementById('score-num').textContent=score;
    initRound();
    postToParent({type:'ready',wordLength,round});
  }
  if(msg.type==='next_round'){
    round=msg.round;
    score+=150;
    document.getElementById('score-num').textContent=score;
    document.getElementById('level-num').textContent=round;
    setTimeout(initRound,400);
  }
  if(msg.type==='elli_says'){
    document.getElementById('elli-bubble').innerHTML=msg.text||elliLines[round-1]||elliLines[0];
  }
});

function getBlanks(word,r){
  const len=word.length;
  if(r===1)return Array.from({length:Math.min(3,len-2)},(_,i)=>len-2-i).reverse();
  if(r===2)return Array.from({length:len},(_,i)=>i).filter(i=>i%2===1&&i>0&&i<len-1);
  if(r===3)return Array.from({length:len},(_,i)=>i).filter(i=>'aeiou'.includes(word[i])&&i>0);
  return Array.from({length:len},(_,i)=>i);
}

function initRound(){
  blankedPositions=getBlanks(secretWord,round);
  currentInput=new Array(blankedPositions.length).fill('');
  document.getElementById('hint-text').innerHTML=hints[round-1]??hints[0];
  document.getElementById('level-num').textContent=round;
  updateStars();
  updateProgress();
  buildTiles();
  buildKeyboard();
  document.getElementById('elli-bubble').innerHTML=elliLines[round-1]??elliLines[0];
}

function updateStars(){
  for(let i=0;i<4;i++){
    const s=document.getElementById('star'+i);
    if(s)s.className=i<round-1?'pstar lit':'pstar dim';
  }
}

function updateProgress(){
  document.getElementById('pf').style.width=((round-1)*25)+'%';
}

function buildTiles(){
  const row=document.getElementById('tiles-row');
  row.innerHTML='';
  const small=wordLength>7;
  for(let i=0;i<wordLength;i++){
    const t=document.createElement('div');
    if(small){t.style.width='38px';t.style.height='44px';t.style.fontSize='16px'}
    if(blankedPositions.includes(i)){
      t.className='tile blank';
      t.dataset.bi=blankedPositions.indexOf(i);
    }else{
      t.className='tile known';
      t.textContent=secretWord[i].toUpperCase();
    }
    row.appendChild(t);
  }
}

const KB=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['del','z','x','c','v','b','n','m','enter']];
function buildKeyboard(){
  KB.forEach((row,ri)=>{
    const el=document.getElementById('kb'+ri);
    el.innerHTML='';
    row.forEach(letter=>{
      const btn=document.createElement('button');
      btn.className='key';
      if(letter==='enter')btn.classList.add('enter-key');
      if(letter==='del')btn.classList.add('del-key');
      btn.textContent=letter==='enter'?'ENTER':letter==='del'?'DEL':letter.toUpperCase();
      btn.id='key-'+letter;
      btn.addEventListener('click',()=>handleKey(letter));
      el.appendChild(btn);
    });
  });
}

function handleKey(l){if(l==='del')deleteLast();else if(l==='enter')submit();else addLetter(l)}

function addLetter(l){
  const ni=currentInput.findIndex(v=>v==='');
  if(ni===-1)return;
  currentInput[ni]=l;
  const t=document.querySelector(`[data-bi="${ni}"]`);
  if(t){t.className='tile filled';t.textContent=l.toUpperCase()}
}

function deleteLast(){
  for(let i=currentInput.length-1;i>=0;i--){
    if(currentInput[i]!==''){
      currentInput[i]='';
      const t=document.querySelector(`[data-bi="${i}"]`);
      if(t){t.className='tile blank';t.textContent=''}
      return;
    }
  }
}

function submit(){
  if(currentInput.some(v=>v===''))return;
  let ok=true;
  blankedPositions.forEach((pos,idx)=>{if(currentInput[idx]!==secretWord[pos])ok=false});
  const tiles=[...document.querySelectorAll('[data-bi]')].sort((a,b)=>+a.dataset.bi-+b.dataset.bi);
  if(ok){
    tiles.forEach((t,i)=>setTimeout(()=>{t.className='tile correct'},i*100));
    score+=150;
    document.getElementById('score-num').textContent=score;
    const dim=document.querySelector('.pstar.dim');
    if(dim)dim.className='pstar lit';
    document.getElementById('pf').style.width=(round*25)+'%';
    setTimeout(()=>postToParent({type:'round_complete',round,word:secretWord,score}),700);
  }else{
    tiles.forEach(t=>{t.className='tile wrong'});
    setTimeout(()=>{
      tiles.forEach((t,i)=>{t.className='tile blank';t.textContent='';t.dataset.bi=i});
      currentInput=new Array(blankedPositions.length).fill('');
    },500);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Backspace'){deleteLast();return}
  if(e.key==='Enter'){submit();return}
  if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toLowerCase());
});

// Demo mode — auto start with cowboy if no postMessage received
setTimeout(()=>{
  if(!secretWord){
    window.dispatchEvent(new MessageEvent('message',{data:{type:'start',word:'cowboy',round:1,playerName:'Ila'}}));
  }
},800);
</script>
</body>
</html>
