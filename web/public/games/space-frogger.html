<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Frogger — Project Sunny</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a1020;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    position: relative;
  }

  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: #9fe1cb;
    border-radius: 50%;
    opacity: 0.35;
    animation: twinkle var(--d) var(--dl) infinite alternate ease-in-out;
  }

  @keyframes twinkle {
    from { opacity: 0.15; transform: scale(0.6); }
    to { opacity: 0.9; transform: scale(1.1); }
  }

  #game-wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    max-width: 100%;
  }

  #hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: min(600px, 100vw - 8px);
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 4px;
  }

  .hud-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 10px;
    color: #5a8a9a;
    letter-spacing: 0.15em;
    font-weight: 700;
  }

  .hud-value {
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 700;
    color: #7fff9a;
    text-shadow: 0 0 10px #7fff9a55;
    letter-spacing: 0.1em;
  }

  .hud-value.lives { color: #ff6688; text-shadow: 0 0 10px #ff668855; }
  .hud-value.hi { color: #9fe1cb; text-shadow: 0 0 10px #9fe1cb55; }
  .hud-value.time { color: #a8b0ff; }

  #canvas {
    border: 2px solid #1a3050;
    box-shadow: 0 0 40px #3a709055, 0 0 80px #20406022;
    display: block;
    background: #040810;
    max-width: 100%;
    height: auto;
    touch-action: none;
  }

  #elli-bubble {
    width: min(600px, 100vw - 8px);
    background: #0e1a28;
    border: 2px solid #2a5080;
    border-radius: 12px;
    padding: 8px 16px;
    font-size: 13px;
    color: #a8d4e8;
    font-style: italic;
    min-height: 36px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: bubblePulse 4s ease-in-out infinite;
  }

  @keyframes bubblePulse {
    0%,100% { border-color: #2a5080; }
    50% { border-color: #4a90c0; }
  }

  .elli-name {
    color: #7fff9a;
    font-style: normal;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }

  #controls-hint {
    font-size: 10px;
    color: #4a6080;
    letter-spacing: 0.08em;
    margin-top: 2px;
    text-align: center;
    max-width: 600px;
    padding: 0 8px;
  }
</style>
</head>
<body>

<div id="starfield"></div>

<div id="game-wrapper">
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="score-display">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">BEST</div>
      <div class="hud-value hi" id="hi-display">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">LEVEL</div>
      <div class="hud-value" id="level-display">1</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">TIME</div>
      <div class="hud-value time" id="time-display">—</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">LIVES</div>
      <div class="hud-value lives" id="lives-display">♥♥♥</div>
    </div>
  </div>

  <canvas id="canvas" width="600" height="500"></canvas>

  <div id="elli-bubble">
    <span class="elli-name" id="companion-name">SUNNY</span>
    <span id="elli-text">Waiting for Sunny to start your reward… 🐸</span>
  </div>

  <div id="controls-hint">↑↓←→ MOVE &nbsp;|&nbsp; WASD &nbsp;|&nbsp; SWIPE &nbsp;|&nbsp; HI SCORE: sunny_space_frogger_hi</div>
</div>

<script>
(function () {
  const HI_KEY = 'sunny_space_frogger_hi';

  const sf = document.getElementById('starfield');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText =
      'width:' + sz + 'px;height:' + sz + 'px;left:' + Math.random() * 100 + '%;top:' + Math.random() * 100 +
      '%;--d:' + (1.5 + Math.random() * 3) + 's;--dl:' + Math.random() * 3 + 's';
    sf.appendChild(s);
  }

  function postToParent(data) {
    try { window.parent.postMessage(data, '*'); } catch (e) {}
  }

  let sessionChildName = 'friend';
  let companionName = 'Sunny';
  let durationSeconds = 180;
  let gameEndPosted = false;
  let readyPosted = false;

  function setCompanionName(name) {
    companionName = String(name || 'Sunny');
    document.getElementById('companion-name').textContent = companionName.toUpperCase();
  }

  function postReadyOnce() {
    if (readyPosted) return;
    readyPosted = true;
    postToParent({ type: 'ready' });
  }

  postReadyOnce();

  function setElli(text) {
    document.getElementById('elli-text').textContent = text;
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const GOAL_Y = 42;
  const START_Y = H - 48;
  const LANE_COUNT = 6;
  const LANE_TOP = 78;
  const LANE_GAP = (START_Y - 20 - LANE_TOP) / LANE_COUNT;
  const FROG = 22;
  const STEP_X = 44;
  const STEP_Y = Math.round(LANE_GAP * 0.92);

  let score = 0;
  let level = 1;
  let lives = 3;
  let timeRemainingMs = 0;
  let lastTs = 0;
  let running = false;
  let rafId = 0;

  let frogX = W / 2;
  let frogY = START_Y;
  let invulnUntil = 0;

  /** @type {{ x: number, w: number, lane: number, vx: number, hue: string }[]} */
  let hazards = [];

  function loadHi() {
    try {
      const v = parseInt(localStorage.getItem(HI_KEY) || '0', 10);
      return Number.isFinite(v) ? v : 0;
    } catch (e) {
      return 0;
    }
  }

  function saveHi(v) {
    try {
      localStorage.setItem(HI_KEY, String(v));
    } catch (e) {}
  }

  let hiScore = loadHi();
  document.getElementById('hi-display').textContent = String(hiScore);

  function laneCenterY(lane) {
    return LANE_TOP + lane * LANE_GAP + LANE_GAP / 2;
  }

  function rebuildHazards() {
    hazards = [];
    const baseV = 38 + level * 10;
    for (let lane = 0; lane < LANE_COUNT; lane++) {
      const y = laneCenterY(lane);
      const dir = lane % 2 === 0 ? 1 : -1;
      const v = (baseV + lane * 6) * dir;
      const count = 3 + Math.min(level, 4);
      const spacing = W / count;
      const hues = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#c084fc', '#f97316'];
      for (let i = 0; i < count; i++) {
        const w = 52 + (lane % 3) * 14;
        let x = i * spacing + (lane % 2) * (spacing / 2);
        if (v > 0 && x > W) x -= W;
        if (v < 0 && x < 0) x += W;
        hazards.push({ x, w, lane, vx: v, hue: hues[lane % hues.length] });
      }
    }
  }

  function resetFrog() {
    frogX = W / 2;
    frogY = START_Y;
    invulnUntil = performance.now() + 1200;
  }

  function livesText() {
    return '♥'.repeat(Math.max(0, lives)) + '·'.repeat(Math.max(0, 3 - lives));
  }

  function updateHud() {
    document.getElementById('score-display').textContent = String(score);
    document.getElementById('level-display').textContent = String(level);
    document.getElementById('lives-display').textContent = livesText();
    const sec = Math.ceil(timeRemainingMs / 1000);
    document.getElementById('time-display').textContent = running ? String(Math.max(0, sec)) : '—';
  }

  function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function frogRect() {
    return { x: frogX - FROG / 2, y: frogY - FROG / 2, w: FROG, h: FROG };
  }

  function hazardRect(h) {
    const cy = laneCenterY(h.lane);
    const hh = LANE_GAP * 0.55;
    return { x: h.x, y: cy - hh / 2, w: h.w, h: hh };
  }

  function hitTraffic() {
    const f = frogRect();
    for (const h of hazards) {
      const r = hazardRect(h);
      if (rectOverlap(f.x, f.y, f.w, f.h, r.x, r.y, r.w, r.h)) return true;
    }
    return false;
  }

  function reachedGoal() {
    return frogY <= GOAL_Y + FROG / 2;
  }

  function die() {
    lives -= 1;
    updateHud();
    if (lives <= 0) {
      finishGame('lives');
      return;
    }
    setElli('Oops! Try again — hop to the station! 🐸');
    resetFrog();
  }

  function scoreGoal() {
    score += 50 * level;
    if (score > hiScore) {
      hiScore = score;
      saveHi(hiScore);
      document.getElementById('hi-display').textContent = String(hiScore);
    }
    level += 1;
    if (level > 12) level = 12;
    setElli('You made it! Level ' + level + '! 🌟');
    rebuildHazards();
    resetFrog();
    updateHud();
  }

  function finishGame(reason) {
    if (gameEndPosted) return;
    gameEndPosted = true;
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = 0;
    const tail = ' Great hopping, ' + sessionChildName + '! Score: ' + score;
    if (reason === 'lives')
      setElli('All lives used!' + tail);
    else
      setElli('Time\'s up!' + tail);
    postToParent({ type: 'game_complete', score: score, level: level });
  }

  function tick(ts) {
    if (!running) return;
    const dt = Math.min(0.05, (ts - lastTs) / 1000 || 0);
    lastTs = ts;

    timeRemainingMs -= dt * 1000;
    if (timeRemainingMs <= 0) {
      timeRemainingMs = 0;
      updateHud();
      finishGame('time');
      return;
    }

    for (const h of hazards) {
      h.x += h.vx * dt;
      if (h.vx > 0 && h.x > W + 20) h.x = -h.w - 20;
      if (h.vx < 0 && h.x < -h.w - 20) h.x = W + 20;
    }

    if (ts >= invulnUntil && frogY < START_Y - 8 && hitTraffic()) {
      die();
    }

    if (reachedGoal()) {
      scoreGoal();
    }

    updateHud();
    draw(ts);
    rafId = requestAnimationFrame(tick);
  }

  function draw() {
    ctx.fillStyle = '#040810';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(30, 80, 60, 0.35)';
    ctx.fillRect(0, 0, W, GOAL_Y + 8);
    ctx.strokeStyle = '#7fff9a55';
    ctx.lineWidth = 2;
    ctx.strokeRect(4, 4, W - 8, GOAL_Y + 4);
    ctx.fillStyle = '#7fff9a';
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('★ SPACE STATION ★', W / 2, 26);

    ctx.fillStyle = 'rgba(40, 50, 90, 0.25)';
    for (let lane = 0; lane < LANE_COUNT; lane++) {
      const y = LANE_TOP + lane * LANE_GAP;
      ctx.fillRect(0, y, W, LANE_GAP - 2);
    }

    for (const h of hazards) {
      const r = hazardRect(h);
      ctx.fillStyle = h.hue;
      ctx.beginPath();
      ctx.roundRect(r.x, r.y, r.w, r.h, 6);
      ctx.fill();
      ctx.strokeStyle = '#ffffff33';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.fillStyle = 'rgba(20, 35, 55, 0.5)';
    ctx.fillRect(0, START_Y - 24, W, H - START_Y + 24);

    const pulse = invulnUntil > performance.now() ? 0.5 + 0.5 * Math.sin(performance.now() / 80) : 1;
    const f = frogRect();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#4ade80';
    ctx.beginPath();
    ctx.ellipse(frogX, frogY, FROG / 2, FROG / 2.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#166534';
    ctx.beginPath();
    ctx.ellipse(frogX - 5, frogY - 4, 4, 4, 0, 0, Math.PI * 2);
    ctx.ellipse(frogX + 5, frogY - 4, 4, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    if (!running) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#9fe1cb';
      ctx.font = 'bold 22px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('SPACE FROGGER', W / 2, H / 2 - 12);
      ctx.font = '14px Courier New';
      ctx.fillStyle = '#7fff9a';
      ctx.fillText('Ready when Sunny starts you…', W / 2, H / 2 + 18);
    }
  }

  if (!ctx.roundRect) {
    ctx.roundRect = function (x, y, w, h, r) {
      const rad = Math.min(r, w / 2, h / 2);
      this.moveTo(x + rad, y);
      this.arcTo(x + w, y, x + w, y + h, rad);
      this.arcTo(x + w, y + h, x, y + h, rad);
      this.arcTo(x, y + h, x, y, rad);
      this.arcTo(x, y, x + w, y, rad);
      this.closePath();
    };
  }

  function startGameFromSession(startLevel) {
    gameEndPosted = false;
    score = 0;
    level = Math.max(1, Math.min(12, startLevel || 1));
    lives = 3;
    timeRemainingMs = durationSeconds * 1000;
    rebuildHazards();
    resetFrog();
    running = true;
    lastTs = performance.now();
    setElli('Hop to the green station! Avoid the ships! 🚀');
    updateHud();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(tick);
  }

  window.addEventListener('message', function (e) {
    const msg = e.data;
    if (!msg || msg.type !== 'start') return;
    sessionChildName = msg.childName || 'friend';
    setCompanionName(msg.companionName || 'Sunny');
    const cfg = msg.config || {};
    durationSeconds = typeof cfg.duration_seconds === 'number' ? cfg.duration_seconds : 180;
    const startLevel = typeof cfg.level === 'number' ? cfg.level : 1;
    startGameFromSession(startLevel);
  });

  const keys = new Set();

  function tryMove(dx, dy) {
    if (!running || gameEndPosted) return;
    frogX = Math.max(FROG, Math.min(W - FROG, frogX + dx));
    frogY = Math.max(GOAL_Y, Math.min(START_Y, frogY + dy));
  }

  window.addEventListener('keydown', function (e) {
    if (!running) return;
    const k = e.key.toLowerCase();
    if (['arrowup', 'w'].includes(k) || e.key === 'ArrowUp') {
      e.preventDefault();
      if (!keys.has('u')) {
        keys.add('u');
        tryMove(0, -STEP_Y);
      }
    } else if (['arrowdown', 's'].includes(k) || e.key === 'ArrowDown') {
      e.preventDefault();
      if (!keys.has('d')) {
        keys.add('d');
        tryMove(0, STEP_Y);
      }
    } else if (['arrowleft', 'a'].includes(k) || e.key === 'ArrowLeft') {
      e.preventDefault();
      if (!keys.has('l')) {
        keys.add('l');
        tryMove(-STEP_X, 0);
      }
    } else if (['arrowright', 'd'].includes(k) || e.key === 'ArrowRight') {
      e.preventDefault();
      if (!keys.has('r')) {
        keys.add('r');
        tryMove(STEP_X, 0);
      }
    }
  });

  window.addEventListener('keyup', function (e) {
    const k = e.key;
    if (k === 'ArrowUp' || k === 'w' || k === 'W') keys.delete('u');
    if (k === 'ArrowDown' || k === 's' || k === 'S') keys.delete('d');
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') keys.delete('l');
    if (k === 'ArrowRight' || k === 'd' || k === 'D') keys.delete('r');
  });

  let touchStart = null;
  canvas.addEventListener(
    'touchstart',
    function (e) {
      if (!running) return;
      const t = e.touches[0];
      touchStart = { x: t.clientX, y: t.clientY };
    },
    { passive: true },
  );
  canvas.addEventListener(
    'touchend',
    function (e) {
      if (!running || !touchStart) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      touchStart = null;
      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;
      if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? STEP_X : -STEP_X, 0);
      else tryMove(0, dy > 0 ? STEP_Y : -STEP_Y);
    },
    { passive: true },
  );

  draw(0);
})();
</script>
</body>
</html>
