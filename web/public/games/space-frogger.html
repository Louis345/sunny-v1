<!DOCTYPE html>
<html lang="en">
<head>
<script src="_contract.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Frogger</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0014;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 8%  12%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 45%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 8%,  #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 75% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 20%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 80%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 90%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 55%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 75%, #fff 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  #ui {
    position: relative;
    z-index: 10;
    text-align: center;
    margin-bottom: 10px;
  }
  #score-display {
    color: #EF9F27;
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 3px;
    text-shadow: 0 0 20px #EF9F2780;
  }
  #lives-display {
    color: #4FC3F7;
    font-size: 1rem;
    margin-top: 4px;
    letter-spacing: 2px;
  }
  #game-container {
    position: relative;
    z-index: 10;
    border: 2px solid #3a1060;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px #6a0dad50, inset 0 0 40px #1a0a2e;
  }
  canvas { display: block; }
  #message {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,0,20,0.88);
    backdrop-filter: blur(4px);
    z-index: 20;
    font-family: 'Courier New', monospace;
  }
  #message h1 {
    font-size: 2.6rem;
    font-weight: 900;
    color: #EF9F27;
    text-shadow: 0 0 30px #EF9F27;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  #message .sub  { font-size: 1rem;   color: #4FC3F7; letter-spacing: 2px; margin-bottom: 6px; }
  #message .hint { font-size: 0.75rem; color: #6a4090; letter-spacing: 1px; margin-bottom: 22px; }
  #message button {
    background: linear-gradient(135deg, #6a0dad, #3a1060);
    border: 2px solid #EF9F27;
    color: #EF9F27;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 3px;
    padding: 11px 30px;
    border-radius: 8px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  #message button:hover {
    background: #EF9F27;
    color: #1a0a2e;
    box-shadow: 0 0 30px #EF9F27;
    transform: scale(1.05);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="ui">
  <div id="score-display">⭐ SCORE: <span id="score">0</span></div>
  <div id="lives-display"><span id="lives">❤️❤️❤️</span></div>
</div>

<div id="game-container" style="position:relative">
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="message">
    <h1>🐸 SPACE FROG</h1>
    <p class="sub">REACH THE PLANETS!</p>
    <p class="hint">← → ↑ ↓  ·  WASD  ·  TAP</p>
    <button id="startBtn">LAUNCH! 🚀</button>
  </div>
</div>

<script>
// ── Audio Engine ───────────────────────────────
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, volume = 0.3, startTime = 0) {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime + startTime);
  gain.gain.setValueAtTime(volume, ac.currentTime + startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + startTime + duration);
  osc.start(ac.currentTime + startTime);
  osc.stop(ac.currentTime + startTime + duration + 0.01);
}

function playFreqRamp(startFreq, endFreq, type, duration, volume = 0.3) {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(startFreq, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(endFreq, ac.currentTime + duration);
  gain.gain.setValueAtTime(volume, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + duration + 0.01);
}

// Sounds
function sndHop() {
  playFreqRamp(200, 400, 'square', 0.07, 0.15);
}

function sndDie() {
  playFreqRamp(400, 60, 'sawtooth', 0.4, 0.25);
  playTone(80, 'sine', 0.3, 0.15, 0.1);
}

function sndGoal() {
  // Rising arpeggio
  [0, 0.08, 0.16, 0.24].forEach((t, i) => {
    playTone([523, 659, 784, 1047][i], 'sine', 0.18, 0.25, t);
  });
}

function sndWin() {
  // Victory fanfare
  const notes = [523, 659, 784, 1047, 1319, 1568];
  notes.forEach((f, i) => playTone(f, 'sine', 0.22, 0.3, i * 0.09));
  // Bass thump
  [0, 0.18, 0.36].forEach(t => playFreqRamp(150, 60, 'sine', 0.15, 0.4));
}

function sndGameOver() {
  playFreqRamp(440, 110, 'sawtooth', 0.6, 0.3);
  playTone(100, 'sine', 0.5, 0.2, 0.2);
}

function sndCarPass() {
  // Subtle whoosh — very quiet
  playFreqRamp(300, 150, 'sine', 0.12, 0.05);
}

// Ambient engine hum (loops)
let engineNode = null;
function startAmbient() {
  try {
    const ac = getAudio();
    engineNode = ac.createOscillator();
    const gain = ac.createGain();
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 200;
    engineNode.type = 'sawtooth';
    engineNode.frequency.value = 55;
    gain.gain.value = 0.04;
    engineNode.connect(filter);
    filter.connect(gain);
    gain.connect(ac.destination);
    engineNode.start();
  } catch(e) {}
}

function stopAmbient() {
  try { engineNode?.stop(); engineNode = null; } catch(e) {}
}

// ── Game ───────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const ROWS = 12, CELL = H / ROWS, COLS = Math.floor(W / CELL);
const GOAL_COUNT = 5;

let gameStarted = false;
window.addEventListener('message', e => { if (e.data?.type === 'start') startGame(); });
window.parent.postMessage({ type: 'ready' }, '*');

let frog, vehicles, score, lives, goalsFilled, animFrame;
let gameOver = false, gameWon = false;
let carPassTimer = 0;

const LANES = [
  { row:1,  spd:  2.0, cars:['🚗','🚙'], n:3, col:'#ff6b35' },
  { row:2,  spd: -1.6, cars:['🚕','🚌'], n:2, col:'#4FC3F7' },
  { row:3,  spd:  2.8, cars:['🚗','🚙'], n:3, col:'#EF9F27' },
  { row:4,  spd: -1.4, cars:['🚕','🚗'], n:2, col:'#a855f7' },
  { row:6,  spd:  3.0, cars:['🚙','🚗'], n:4, col:'#ff4444' },
  { row:7,  spd: -1.8, cars:['🚕','🚌'], n:2, col:'#4FC3F7' },
  { row:8,  spd:  2.4, cars:['🚗','🚙'], n:3, col:'#EF9F27' },
  { row:9,  spd: -2.2, cars:['🚕','🚗'], n:2, col:'#a855f7' },
  { row:10, spd:  1.8, cars:['🚌','🚙'], n:3, col:'#ff6b35' },
];

function initGame() {
  frog = { col: Math.floor(COLS/2), row: ROWS-1, dead: false, deadTimer: 0 };
  score = 0; lives = 3; gameOver = false; gameWon = false;
  goalsFilled = new Array(GOAL_COUNT).fill(false);
  carPassTimer = 0;
  vehicles = [];
  LANES.forEach(l => {
    for (let i = 0; i < l.n; i++) {
      const sp = W / l.n;
      vehicles.push({
        x: sp * i + Math.random() * sp * 0.5,
        row: l.row, spd: l.spd,
        emoji: l.cars[i % l.cars.length],
        col: l.col, w: CELL * 1.5,
        lastX: 0,
      });
    }
  });
  updateHUD();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
}

// ── Draw ──────────────────────────────────────
function drawBg() {
  ctx.fillStyle = '#0a0014';
  ctx.fillRect(0, 0, W, H);
}

function drawLanes() {
  for (let r = 0; r < ROWS; r++) {
    const y = r * CELL;
    if (r === 0) {
      ctx.fillStyle = '#050010';
      ctx.fillRect(0, y, W, CELL);
    } else if (r === 5 || r === ROWS - 1) {
      ctx.fillStyle = '#110820';
      ctx.fillRect(0, y, W, CELL);
      ctx.fillStyle = '#EF9F2725';
      ctx.fillRect(0, y, W, 2);
      ctx.fillRect(0, y + CELL - 2, W, 2);
    } else {
      ctx.fillStyle = '#0d0420';
      ctx.fillRect(0, y, W, CELL);
      ctx.setLineDash([10, 10]);
      ctx.strokeStyle = '#ffffff12';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, y + CELL - 1);
      ctx.lineTo(W, y + CELL - 1);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function drawGoals() {
  const sw = W / GOAL_COUNT;
  for (let i = 0; i < GOAL_COUNT; i++) {
    const x = sw * i, y = 0, p = 5;
    ctx.fillStyle = goalsFilled[i] ? '#EF9F2718' : '#080018';
    ctx.beginPath();
    if (typeof ctx.roundRect === 'function') {
      ctx.roundRect(x+p, y+p, sw-p*2, CELL-p*2, 6);
    } else {
      ctx.rect(x+p, y+p, sw-p*2, CELL-p*2);
    }
    ctx.fill();
    ctx.strokeStyle = goalsFilled[i] ? '#EF9F27' : '#251045';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = `${CELL * (goalsFilled[i] ? 0.55 : 0.3)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(goalsFilled[i] ? '🌍' : '⭐', x + sw/2, CELL/2);
  }
}

function drawCars() {
  vehicles.forEach(v => {
    ctx.font = `${CELL * 0.6}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = v.col;
    ctx.shadowBlur = 8;
    ctx.fillText(v.emoji, v.x + v.w/2, v.row * CELL + CELL/2);
    ctx.shadowBlur = 0;
  });
}

function drawFrog() {
  if (frog.dead && frog.deadTimer % 6 < 3) return;
  const x = frog.col * CELL, y = frog.row * CELL;
  const cx = x + CELL/2, cy = y + CELL/2, r = CELL * 0.36;

  ctx.shadowColor = frog.dead ? '#ff4444' : '#4FC3F7';
  ctx.shadowBlur  = 12;
  ctx.fillStyle = frog.dead ? '#ff6666' : '#4FC3F7';
  ctx.beginPath();
  ctx.ellipse(cx, cy + r*0.1, r, r*0.75, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = frog.dead ? '#cc4444' : '#0288D1';
  ctx.beginPath();
  ctx.ellipse(cx - r*0.7, cy + r*0.5, r*0.28, r*0.16, -0.4, 0, Math.PI*2);
  ctx.ellipse(cx + r*0.7, cy + r*0.5, r*0.28, r*0.16,  0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx - r*0.37, cy - r*0.28, r*0.2, 0, Math.PI*2);
  ctx.arc(cx + r*0.37, cy - r*0.28, r*0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#001';
  ctx.beginPath();
  ctx.arc(cx - r*0.37, cy - r*0.28, r*0.1, 0, Math.PI*2);
  ctx.arc(cx + r*0.37, cy - r*0.28, r*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#0277BD';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy + r*0.15, r*0.22, 0.3, Math.PI - 0.3);
  ctx.stroke();
}

// ── Logic ─────────────────────────────────────
const isTraffic = r => (r>=1&&r<=4)||(r>=6&&r<=10);

function moveCars() {
  carPassTimer++;
  vehicles.forEach(v => {
    v.lastX = v.x;
    v.x += v.spd;
    if (v.spd > 0 && v.x > W + v.w) v.x = -v.w;
    if (v.spd < 0 && v.x < -v.w)    v.x = W + v.w;

    // Play whoosh when car passes near frog's column
    if (v.row === frog.row && isTraffic(frog.row)) {
      const fc = frog.col * CELL + CELL/2;
      const prevDist = Math.abs(v.lastX + v.w/2 - fc);
      const currDist = Math.abs(v.x + v.w/2 - fc);
      if (prevDist > CELL && currDist <= CELL && carPassTimer % 3 === 0) {
        sndCarPass();
      }
    }
  });
}

function checkHit() {
  if (frog.dead || !isTraffic(frog.row)) return;
  const fx = frog.col*CELL + CELL/2, fy = frog.row*CELL + CELL/2;
  const m = CELL*0.22;
  for (const v of vehicles) {
    if (v.row !== frog.row) continue;
    if (fx+m > v.x && fx-m < v.x+v.w &&
        fy > v.row*CELL+m && fy < (v.row+1)*CELL-m) { killFrog(); return; }
  }
}

function checkGoal() {
  if (frog.row !== 0) return;
  const sw = W / GOAL_COUNT;
  const fx = frog.col*CELL + CELL/2;
  for (let i = 0; i < GOAL_COUNT; i++) {
    if (Math.abs(fx - (sw*i + sw/2)) < sw*0.42) {
      if (goalsFilled[i]) { killFrog(); return; }
      goalsFilled[i] = true; score += 50; updateHUD();
      sndGoal();
      resetFrog();
      if (goalsFilled.every(Boolean)) setTimeout(triggerWin, 200);
      return;
    }
  }
  killFrog();
}

function killFrog() {
  if (frog.dead) return;
  frog.dead = true; frog.deadTimer = 36; lives--;
  sndDie();
  updateHUD();
  if (lives <= 0) setTimeout(() => endGame(false), 800);
  else            setTimeout(resetFrog, 700);
}

function resetFrog() {
  frog.col = Math.floor(COLS/2); frog.row = ROWS-1;
  frog.dead = false; frog.deadTimer = 0;
}

function triggerWin() {
  gameWon = true; score += 200;
  sndWin();
  setTimeout(() => endGame(true), 600);
}

function endGame(won) {
  gameOver = true;
  stopAmbient();
  cancelAnimationFrame(animFrame);
  if (!won) sndGameOver();
  const msg = document.getElementById('message');
  msg.innerHTML = `
    <h1 style="color:${won?'#EF9F27':'#ff4444'}">${won?'🌍 YOU WIN!':'💀 GAME OVER'}</h1>
    <p class="sub">SCORE: ${score}</p>
    <p class="hint">${won?'ALL PLANETS REACHED!':'BETTER LUCK NEXT TIME'}</p>
    <button onclick="startGame()">${won?'PLAY AGAIN ⭐':'TRY AGAIN'}</button>
  `;
  msg.classList.remove('hidden');
  if (won) {
    sendNodeComplete({
      completed: true,
      accuracy: 1,
      flaggedWords: [],
      xpEarned: score,
      timeSpent_ms: 0,
      score,
      won: true,
    });
  }
}

// ── Loop ──────────────────────────────────────
function loop() {
  moveCars();
  if (!frog.dead) { checkHit(); if (frog.row===0) checkGoal(); }
  else frog.deadTimer--;
  drawBg(); drawLanes(); drawGoals(); drawCars(); drawFrog();
  animFrame = requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('message').classList.add('hidden');
  cancelAnimationFrame(animFrame);
  stopAmbient();
  initGame();
  gameStarted = true;
  startAmbient();
  loop();
}

// ── Controls ──────────────────────────────────
function move(dc, dr) {
  if (!gameStarted||gameOver||gameWon||frog.dead) return;
  frog.row = Math.max(0, Math.min(ROWS-1, frog.row+dr));
  frog.col = Math.max(0, Math.min(COLS-1, frog.col+dc));
  if (dr < 0) { score += 10; updateHUD(); }
  sndHop();
}

document.addEventListener('keydown', e => {
  const m = {ArrowUp:[0,-1],w:[0,-1],ArrowDown:[0,1],s:[0,1],
              ArrowLeft:[-1,0],a:[-1,0],ArrowRight:[1,0],d:[1,0]}[e.key];
  if (m) { e.preventDefault(); move(...m); }
});

let tx=0,ty=0;
canvas.addEventListener('touchstart', e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  Math.abs(dx)>Math.abs(dy)?move(dx>0?1:-1,0):move(0,dy>0?1:-1);
  e.preventDefault();
},{passive:false});
canvas.addEventListener('click', e=>{
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(W/r.width), cy=(e.clientY-r.top)*(H/r.height);
  const dx=cx-(frog.col*CELL+CELL/2), dy=cy-(frog.row*CELL+CELL/2);
  Math.abs(dx)>Math.abs(dy)?move(dx>0?1:-1,0):move(0,dy>0?1:-1);
});

document.getElementById('startBtn').addEventListener('click', startGame);
initGame();
drawBg(); drawLanes(); drawGoals(); drawCars(); drawFrog();
</script>
</body>
</html>
