/* ── Misspelling generator ────────────────────────────────────── */
function makeMisspellings(word, n = 3) {
  const out = [];
  const used = new Set([word]);
  const strategies = [
    w => { // vowel swap
      const vowels = 'aeiou';
      const idxs = [...w].map((c,i)=>vowels.includes(c)?i:-1).filter(i=>i>=0);
      if (!idxs.length) return null;
      const i = idxs[Math.floor(Math.random()*idxs.length)];
      const v = vowels.replace(w[i],'');
      return w.slice(0,i) + v[Math.floor(Math.random()*v.length)] + w.slice(i+1);
    },
    w => w.endsWith('er') ? w.slice(0,-2)+'or' : w.endsWith('or') ? w.slice(0,-2)+'er' : null,
    w => w.endsWith('er') ? w.slice(0,-2)+'ar' : null,
    w => { // double a consonant
      const cons = [...w].reduce((a,c,i)=>{if(!'aeiou'.includes(c)&&i>0&&i<w.length-1)a.push(i);return a;},[]);
      if (!cons.length) return null;
      const i = cons[Math.floor(Math.random()*cons.length)];
      return w.slice(0,i)+w[i]+w.slice(i);
    },
    w => { // remove a vowel
      const idxs = [...w].map((c,i)=>'aeiou'.includes(c)?i:-1).filter(i=>i>0&&i<w.length-1);
      if (!idxs.length) return null;
      const i = idxs[Math.floor(Math.random()*idxs.length)];
      return w.slice(0,i)+w.slice(i+1);
    },
    w => { // swap adjacent letters
      const i = 1+Math.floor(Math.random()*(w.length-2));
      return w.slice(0,i)+w[i+1]+w[i]+w.slice(i+2);
    },
  ];
  let tries = 0;
  while (out.length < n && tries < 40) {
    tries++;
    const s = strategies[Math.floor(Math.random()*strategies.length)];
    const v = s(word);
    if (v && v !== word && v.length >= 3 && !used.has(v)) { used.add(v); out.push(v); }
  }
  while (out.length < n) out.push(word.slice(0,-1)+'x'+out.length);
  return out;
}

/* ── Shuffle ─────────────────────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

/* ═══════════════════════════════════════════════════════════════
   SOUND ENGINE
═══════════════════════════════════════════════════════════════ */
class SE {
  static _ctx = null;
  static get ctx() {
    if (!SE._ctx) SE._ctx = new (window.AudioContext||window.webkitAudioContext)();
    if (SE._ctx.state==='suspended') SE._ctx.resume();
    return SE._ctx;
  }
  static _osc(freq,type,dur,vol,when=0,freqEnd){
    const ctx=SE.ctx, t=ctx.currentTime+(when||0);
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    if(freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur*.9);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+dur+.02);
  }
  static _noise(dur,vol,filterFreq,when=0){
    const ctx=SE.ctx, t=ctx.currentTime+(when||0);
    const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*dur),ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*dur*.4));
    const src=ctx.createBufferSource(); src.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=filterFreq; f.Q.value=2;
    const g=ctx.createGain(); g.gain.value=vol;
    src.connect(f); f.connect(g); g.connect(ctx.destination);
    src.start(t);
  }
  static correct(){
    SE._osc(880,'sine',.18,.35);
    SE._osc(1320,'sine',.14,.22,.04);
    SE._osc(1760,'sine',.10,.15,.08);
    SE._noise(.06,.3,4000);
  }
  static wrong(){
    SE._osc(220,'sawtooth',.25,.4,0,80);
    SE._osc(150,'square',.2,.25,.08);
    SE._noise(.12,.25,400);
  }
  static whoosh(){
    SE._osc(800,'sawtooth',.12,.15,0,200);
    SE._noise(.1,.2,3000);
  }
  static tick(){
    SE._osc(440,'sine',.06,.12);
  }
  static fanfare(){
    [523,659,784,1047,1319,1568].forEach((f,i)=>{
      SE._osc(f,'sine',.6,.28,i*.09);
      SE._osc(f*1.5,'sine',.3,.12,i*.09+.02);
    });
    SE._noise(.1,.4,4000,.55);
    for(let i=0;i<10;i++) SE._osc(1200+Math.random()*800,'sine',.25,.1,.6+i*.12);
  }
  static gameover(){
    SE._osc(440,'sawtooth',.6,.4,0,100);
    SE._osc(300,'sawtooth',.5,.3,.15,60);
    SE._osc(150,'sine',.8,.35,.35,40);
  }
}

function Starfield() {

/* ═══════════════════════════════════════════════════════════════
   BUBBLE COMPONENT
═══════════════════════════════════════════════════════════════ */
function Bubble({ bubble, onTap, disabled, screenH }) {
  const ref = useRef(null);
  const [y, setY] = useState(-80);
  const bubbleColor = bubble.color || BUBBLE_COLORS[0];

  useEffect(()=>{
    const start = performance.now();
    const dur = bubble.fallDuration;
    let raf;
    function tick(now){
      const p = Math.min(1,(now-start)/dur);
      setY(-80 + p*(screenH+120));
      if(p<1) raf=requestAnimationFrame(tick);
    }
    raf=requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(raf);
  },[bubble.fallDuration, screenH]);

  const handleTap = useCallback(()=>{
    if(disabled) return;
    onTap(bubble);
  },[disabled, bubble, onTap]);

  return (
    <div
      onClick={handleTap}
      style={{
        position:'absolute',
        left:`${bubble.lane}%`,
        top:y,
        transform:'translateX(-50%)',
        width:170,
        padding:'12px 20px',
        borderRadius:999,
        background: bubbleColor.bg,
        border:`2.5px solid ${bubbleColor.border}`,
        boxShadow: `0 0 20px ${bubbleColor.border}55`,
        cursor: disabled ? 'default' : 'pointer',
        userSelect:'none',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontFamily:'Lexend,sans-serif',
        fontSize:BASE_FONT * .6,
        fontWeight:800,
        color:'white',
        textShadow:'0 2px 8px rgba(0,0,0,.6)',
        transition:'transform .1s',
        pointerEvents: disabled ? 'none' : 'auto',
        zIndex:8,
        backdropFilter:'blur(4px)',
      }}
      onMouseDown={e=>{ if(!disabled) e.currentTarget.style.transform='translateX(-50%) scale(.95)'; }}
      onMouseUp={e=>{ e.currentTarget.style.transform='translateX(-50%) scale(1)'; }}
    >
      {bubble.word}
    </div>
  );
}

    <div style={{position:'absolute',bottom:60,right:16,zIndex:15,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>

        <div style={{

          maxWidth:200,fontSize:12,fontWeight:600,color:'white',lineHeight:1.5,

  );
}

  const [flash, setFlash]           = useState(null);       // 'correct'|'wrong'|null
  const [compMood, setCompMood]     = useState('happy');
  const [compSpeech, setCompSpeech] = useState('Catch the correctly spelled word! 🌟');
  const [tappedId, setTappedId]     = useState(null);
  const [catcherAnim, setCatcherAnim] = useState(false);
  const [countdown, setCountdown]   = useState(3);

  const screenH = window.innerHeight;
  const currentWord = WORDS[wordIdx] || '';
  const startTime = useRef(Date.now());
  const roundStart = useRef(0);
  const completedRef = useRef(false);
  const wordsCorrect = useRef([]);
  const wordsWrong = useRef([]);
  const timerRef = useRef(null);
  const compTimerRef = useRef(null);
  const fallTimerRef = useRef(null);

  /* ── GameBridge helpers ─────────────────────────────────────── */
  const reportState = (msg, extras={}) => {
    if(window.GameBridge?.reportState) window.GameBridge.reportState(msg,{game:'speed-catcher',wordIdx,score,lives,...extras});
  };
  const reportAction = (action, msg, extras={}) => {
    if(window.GameBridge?.reportAction) window.GameBridge.reportAction(action,msg,{game:'speed-catcher',wordIdx,score,lives,...extras});
  };
  const fireComp = (trigger, payload={}) => {
    if(window.fireCompanionEvent) window.fireCompanionEvent(trigger,payload);
  };

  /* ── Build bubbles for a word ───────────────────────────────── */
  const buildBubbles = useCallback((word) => {
    const misses = makeMisspellings(word, BUBBLE_COUNT-1);
    const all = shuffle([{word,correct:true},...misses.map(w=>({word:w,correct:false}))]);
    const lanes = shuffle([12,33,55,77]).slice(0,all.length);
    const speedVariance = .85 + Math.random()*.3;
    return all.map((b,i)=>({
      ...b,
      id: `${word}-${i}-${Date.now()}`,
      lane: lanes[i],
      fallDuration: FALL_DURATION_BASE * speedVariance * (.88+i*.04),
      color: BUBBLE_COLORS[Math.floor(Math.random()*BUBBLE_COLORS.length)],
    }));
  },[]);

  /* ── Start round ────────────────────────────────────────────── */
  const startRound = useCallback((idx) => {
    const word = WORDS[idx];
    if(!word) return;
    const bs = buildBubbles(word);
    setBubbles(bs);
    setTappedId(null);
    setTimerPct(1);
    roundStart.current = Date.now();

    reportState(`Round ${idx+1}/${WORDS.length}: word is "${word}". Bubbles falling.`,{currentWord:word,round:idx+1});

    // Timer bar
    clearInterval(timerRef.current);
    timerRef.current = setInterval(()=>{
      const elapsed = Date.now()-roundStart.current;
      const pct = Math.max(0,1-elapsed/(ROUND_TIME*1000));
      setTimerPct(pct);
      if(pct<=0){
        clearInterval(timerRef.current);
        handleTimeout(idx);
      }
    },50);

    // Companion thinks/speaks
    const sayings = [
      `Find the real "${word}"!`,
      `One of these is right — you've got this!`,
      `Catch it before it falls! ⬇️`,
      `Stay sharp — fake ones incoming! 👀`,
    ];
    setCompSpeech(sayings[idx%sayings.length]);
    setCompMood('thinking');
    setTimeout(()=>setCompMood('happy'),1200);

    // Companion AI catches (2-player mode) — waits 1.5-3s, then auto-grabs
    if(PLAYER_COUNT===2){
      clearTimeout(compTimerRef.current);
      const delay = 1500+Math.random()*1500;
      compTimerRef.current = setTimeout(()=>{
        // Companion catches correct 80% of time
        if(Math.random()<.8){
          setCompScore(s=>s+100);
          setCompMood('celebrating');
          setCompSpeech('Got one! Your turn next! 😄');
          fireComp('correct_answer',{role:'companion',word});
          setTimeout(()=>setCompMood('happy'),1500);
        } else {
          setCompMood('wrong');
          setCompSpeech('Oops! Missed that one! 😅');
          setTimeout(()=>setCompMood('happy'),1200);
        }
      },delay);
    }

    // Auto-clear bubbles that hit bottom
    clearTimeout(fallTimerRef.current);
    fallTimerRef.current = setTimeout(()=>{
      // Bubble fell off bottom — check if not already tapped
      setTappedId(prev=>{
        if(prev===null) handleTimeout(idx,true);
        return prev;
      });
    },FALL_DURATION_BASE*1.1);
  },[buildBubbles]);

  /* ── Timeout ─────────────────────────────────────────────────── */
  const handleTimeout = useCallback((idx,fromFall=false)=>{
    clearInterval(timerRef.current);
    SE.wrong();
    fireComp('wrong_answer',{reason:'timeout',word:WORDS[idx]});
    setFlash('wrong');
    setLives(l=>{
      const nl=l-1;
      if(nl<=0) setTimeout(()=>endGame(false),500);
      else setTimeout(()=>nextWord(idx+1),700);
      return nl;
    });
    wordsWrong.current.push(WORDS[idx]);
    setCompSpeech('Time\'s up! Keep going! ⏱️');
    reportAction('timeout',`Timeout on word "${WORDS[idx]}".`,{word:WORDS[idx],reason:'timeout'});
    setTimeout(()=>setFlash(null),500);
  },[]);

  /* ── Bubble tapped ──────────────────────────────────────────── */
  const handleBubbleTap = useCallback((bubble)=>{
    if(tappedId) return;  // already answered this round
    clearInterval(timerRef.current);
    clearTimeout(compTimerRef.current);
    clearTimeout(fallTimerRef.current);
    setTappedId(bubble.id);
    SE.whoosh();

    if(bubble.correct){
      SE.correct();
      const timeBonus = Math.round(timerPct*100);
      const earned = 100+timeBonus;
      setScore(s=>s+earned);
      setFlash('correct');
      setCatcherAnim(true);
      setTimeout(()=>setCatcherAnim(false),500);
      fireComp('correct_answer',{word:currentWord,earned});
      setCompMood('celebrating');
      setCompSpeech(`YES! +${earned} pts! Speedy! 🎉`);
      wordsCorrect.current.push(currentWord);
      reportAction('correct',`Correct! "${currentWord}" caught. +${earned} pts.`,{word:currentWord,earned,correct:true});
      setTimeout(()=>{ setCompMood('happy'); setFlash(null); nextWord(wordIdx+1); },700);
    } else {
      SE.wrong();
      setFlash('wrong');
      setLives(l=>{
        const nl=l-1;
        reportAction('wrong',`Wrong bubble tapped for "${currentWord}". Lives: ${nl}.`,{word:currentWord,tapped:bubble.word,correct:false});
        fireComp('wrong_answer',{word:currentWord,tapped:bubble.word});
        setCompMood('wrong');
        setCompSpeech('Not that one! Keep looking! 👀');
        if(nl<=0) setTimeout(()=>endGame(false),600);
        else setTimeout(()=>{ setCompMood('happy'); setFlash(null); nextWord(wordIdx+1); },700);
        return nl;
      });
      wordsWrong.current.push(currentWord);
    }
  },[tappedId,timerPct,currentWord,wordIdx]);

  /* ── Next word ───────────────────────────────────────────────── */
  const nextWord = useCallback((idx)=>{
    if(idx >= WORDS.length){ endGame(true); return; }
    setWordIdx(idx);
    setBubbles([]);
    setTimeout(()=>startRound(idx),300);
  },[startRound]);

  /* ── End game ────────────────────────────────────────────────── */
  const endGame = useCallback((won)=>{
    if(completedRef.current) return;
    completedRef.current=true;
    clearInterval(timerRef.current);
    clearTimeout(compTimerRef.current);
    setPhase(won?'won':'lost');
    setBubbles([]);
    if(won){ SE.fanfare(); setCompMood('celebrating'); setCompSpeech('You did it! Amazing! 🏆'); }
    else { SE.gameover(); setCompMood('wrong'); setCompSpeech('Good effort! Try again! 💪'); }
    const result={
      completed:won,
      accuracy:wordsCorrect.current.length/WORDS.length,
      wordsCorrect:wordsCorrect.current,
      wordsStruggled:wordsWrong.current,
      flaggedWords:wordsWrong.current,
      xpEarned: won?150:40,
      coinsEarned:score,
      timeSpent_ms:Date.now()-startTime.current,
      wordsAttempted:WORDS.length,
    };
    reportState(won?`Game won! Score: ${score}. ${wordsCorrect.current.length}/${WORDS.length} correct.`:`Game over. Score: ${score}.`,result);
    if(window.GameBridge?.awardCurrency) window.GameBridge.awardCurrency(score,'speed_catcher');
    setTimeout(()=>{ if(window.sendNodeComplete) window.sendNodeComplete(result); },2000);
  },[score]);

  /* ── Countdown then play ─────────────────────────────────────── */
  useEffect(()=>{
    if(phase!=='countdown') return;
    let c=3; setCountdown(c);
    const id=setInterval(()=>{
      c--; setCountdown(c); SE.tick();
      if(c<=0){ clearInterval(id); setPhase('playing'); }
    },900);
    return ()=>clearInterval(id);
  },[phase]);

  useEffect(()=>{
    if(phase==='playing') startRound(0);
  },[phase]);

  /* ── Heartbeat ───────────────────────────────────────────────── */
  useEffect(()=>{
    if(phase!=='playing') return;
    const id=window.GameBridge?.startHeartbeat?.(
      ()=>`Speed Catcher — word ${wordIdx+1}/${WORDS.length}, score ${score}, lives ${lives}`,
      ()=>({game:'speed-catcher',wordIdx,score,lives,currentWord:WORDS[wordIdx]})
    );
    return ()=>id&&clearInterval(id);
  },[phase,wordIdx,score,lives]);

  /* ── Timer bar color ─────────────────────────────────────────── */
  const timerColor = timerPct>.5?T.accent:timerPct>.25?'#F59E0B':'#EF4444';

  /* ═══════════════════════════════════════════════════════════════
     RENDER
  ═══════════════════════════════════════════════════════════════ */
  return (
    <div style={{
      position:'fixed',inset:0,background:T.bg,
      fontFamily:'Lexend,sans-serif',overflow:'hidden',
    }}>
      <Starfield/>

      {/* Flash overlay */}
      {flash && (
        <div style={{
          position:'absolute',inset:0,pointerEvents:'none',zIndex:1,
          animation:`${flash==='correct'?'correct-flash':'wrong-flash'} .5s ease`,
        }}/>
      )}

      {/* ── INTRO ── */}
      {phase==='intro' && (
        <div style={{
          position:'absolute',inset:0,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:24,zIndex:20,
          animation:'slideUp .5s ease',
        }}>
          <div style={{fontSize:13,fontWeight:700,letterSpacing:'.25em',textTransform:'uppercase',color:T.accent}}>
            🚀 Speed Catcher
          </div>
          <div style={{fontFamily:'Lexend',fontSize:56,fontWeight:900,color:'white',textAlign:'center',lineHeight:1.1,textShadow:`0 0 40px ${T.glow}`}}>
            Catch the<br/><span style={{color:T.accent}}>right word!</span>
          </div>
          <div style={{fontSize:16,color:'rgba(255,255,255,.6)',maxWidth:440,textAlign:'center',lineHeight:1.7}}>
            Words fall from space. Tap the <strong style={{color:'white'}}>correctly spelled</strong> one before it hits the ground. Dodge the fakes!
          </div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center',marginTop:4}}>
            {['Spelling',`${WORDS.length} words`,`${LIVES_MAX} lives`,`${ROUND_TIME}s each`].map(t=>(
              <div key={t} style={{fontSize:12,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',padding:'5px 14px',borderRadius:999,background:`${T.accent}18`,border:`1px solid ${T.accent}44`,color:T.accent}}>{t}</div>
            ))}
          </div>
          <button
            onClick={()=>setPhase('countdown')}
            style={{
              marginTop:8,padding:'18px 54px',
              background:`linear-gradient(135deg,${T.accent},${T.accent2})`,
              border:'none',borderRadius:18,
              fontSize:20,fontWeight:900,color:'white',cursor:'pointer',
              boxShadow:`0 8px 32px ${T.glow}`,letterSpacing:'.05em',
              transition:'transform .15s',
            }}
            onMouseDown={e=>e.currentTarget.style.transform='scale(.96)'}
            onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
          >
            🚀 Let's Go!
          </button>
        </div>
      )}

      {/* ── COUNTDOWN ── */}
      {phase==='countdown' && (
        <div style={{
          position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
          flexDirection:'column',gap:16,zIndex:20,
        }}>
          <div style={{fontSize:120,fontWeight:900,color:T.accent,
            textShadow:`0 0 60px ${T.glow}`,
            animation:'countdownPulse .7s ease',
            key:countdown,
          }}>{countdown>0?countdown:'GO!'}</div>
          <div style={{fontSize:18,color:'rgba(255,255,255,.5)',fontWeight:600}}>Get ready…</div>
        </div>
      )}

      {/* ── PLAYING ── */}
      {phase==='playing' && <>
        {/* Header */}
        <div style={{
          position:'relative',zIndex:6,
          display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'12px 20px',
          background:`rgba(0,0,0,.35)`,
          borderBottom:`2px solid ${T.headerBorder}`,
          backdropFilter:'blur(8px)',
        }}>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <Lives count={lives} max={LIVES_MAX}/>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(255,255,255,.4)'}}>
              {wordIdx+1}/{WORDS.length}
            </div>
          </div>

          {/* Timer bar — center */}
          <div style={{flex:1,margin:'0 24px',height:8,background:'rgba(255,255,255,.1)',borderRadius:4,overflow:'hidden'}}>
            <div style={{
              height:'100%',
              width:`${timerPct*100}%`,
              background:`linear-gradient(90deg,${timerColor},${timerColor}aa)`,
              borderRadius:4,
              transition:'width .05s linear, background .3s',
              boxShadow:`0 0 8px ${timerColor}88`,
            }}/>
          </div>

          <div style={{
            display:'flex',alignItems:'center',gap:8,
            background:`${T.accent}18`,border:`1.5px solid ${T.accent}44`,
            borderRadius:12,padding:'6px 14px',
          }}>
            <span style={{fontSize:13,fontWeight:800,color:T.gold}}>🪙</span>
            <span style={{fontSize:18,fontWeight:800,color:T.gold}}>{score}</span>
          </div>
        </div>

        {/* Target word display */}
        <div style={{
          position:'relative',zIndex:5,
          display:'flex',flexDirection:'column',alignItems:'center',
          padding:'16px 20px 10px',gap:6,
        }}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:'.2em',textTransform:'uppercase',color:'rgba(255,255,255,.35)'}}>
            {CATEGORY} — Find the correct spelling:
          </div>
          <div style={{
            padding:'12px 32px',borderRadius:16,
            background:T.targetBg,
            border:`2px solid ${T.targetBorder}`,
            boxShadow:`0 0 24px ${T.glow}44`,
          }}>
            <div style={{
              fontSize:BASE_FONT,fontWeight:900,color:'white',
              letterSpacing:'.08em',textShadow:`0 0 20px ${T.glow}`,
            }}>{currentWord.toUpperCase()}</div>
          </div>
          <div style={{fontSize:12,color:'rgba(255,255,255,.35)',fontWeight:600}}>
            Tap the correctly spelled word below ↓
          </div>
        </div>

        {/* Falling bubbles */}
        <div style={{position:'absolute',inset:0,zIndex:4,pointerEvents:'none'}}>
          {bubbles.map(b=>(
            <Bubble key={b.id} bubble={b} onTap={handleBubbleTap}
              disabled={!!tappedId} screenH={screenH}/>
          ))}
        </div>

        {/* Catchers */}
        {PLAYER_COUNT===2 ? <>
          <CatcherBar name={CHILD_NAME} color={T.catcherP1} score={score} side="left" animate={catcherAnim}/>
          <CatcherBar name={COMPANION_NAME} color={T.catcherP2} score={compScore} side="right"/>
        </> : (
          <CatcherBar name={CHILD_NAME} color={T.catcherP1} score={score} side="center" animate={catcherAnim}/>
        )}
      </>}

      {/* ── WIN / LOSE ── */}
      {(phase==='won'||phase==='lost') && (
        <div style={{
          position:'absolute',inset:0,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:20,zIndex:20,
          background:'rgba(0,0,0,.6)',backdropFilter:'blur(12px)',
          animation:'slideUp .5s ease',
        }}>
          <div style={{fontSize:72,animation:'popIn .5s ease'}}>{phase==='won'?'🏆':'💪'}</div>
          <div style={{
            fontFamily:'Lexend',fontSize:48,fontWeight:900,
            color:phase==='won'?T.gold:'rgba(255,255,255,.8)',
            textShadow:phase==='won'?`0 0 30px ${T.gold}44`:'none',
          }}>{phase==='won'?'Incredible!':'Good effort!'}</div>
          <div style={{fontSize:18,color:'rgba(255,255,255,.6)',textAlign:'center',maxWidth:380,lineHeight:1.7}}>
            {wordsCorrect.current.length} of {WORDS.length} words caught correctly
          </div>
          {/* Score breakdown */}
          <div style={{display:'flex',gap:20,flexWrap:'wrap',justifyContent:'center'}}>
            {[
              {label:'Score',val:`${score} pts`,color:T.gold},
              {label:'Accuracy',val:`${Math.round(wordsCorrect.current.length/WORDS.length*100)}%`,color:T.accent},
              {label:'Lives left',val:`${lives}/${LIVES_MAX}`,color:T.correct},
            ].map(({label,val,color})=>(
              <div key={label} style={{
                background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',
                borderRadius:14,padding:'12px 20px',textAlign:'center',
              }}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:'.15em',textTransform:'uppercase',color:'rgba(255,255,255,.4)',marginBottom:4}}>{label}</div>
                <div style={{fontSize:28,fontWeight:900,color}}>{val}</div>
              </div>
            ))}
          </div>
          <button
            onClick={()=>{ completedRef.current=false; wordsCorrect.current=[]; wordsWrong.current=[]; setScore(0); setCompScore(0); setLives(LIVES_MAX); setWordIdx(0); setPhase('intro'); }}
            style={{
              marginTop:8,padding:'14px 40px',
              background:`linear-gradient(135deg,${T.accent},${T.accent2})`,
              border:'none',borderRadius:14,fontSize:18,fontWeight:800,
              color:'white',cursor:'pointer',
              boxShadow:`0 6px 24px ${T.glow}`,
            }}
          >Play Again 🚀</button>
        </div>
      )}

      {/* Companion */}
      {phase!=='intro' && (
        <CompanionPortrait mood={compMood} name={COMPANION_NAME} speech={compSpeech}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
