<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Letter Rush</title>
  <script src="_contract.js"></script>
  <style>
    :root{
      --bg1:#1B0B3A;
      --bg2:#5B21B6;
      --bg3:#070010;
      --accent:#F59E0B;
      --good:#34D399;
      --bad:#EF4444;
      --ink:#FFFFFF;
      --card:#1F1147;
      --hot:#FB7185;
      --cold:#06B6D4;
      --bg-image:none;
      --fallback-bg:radial-gradient(ellipse 100% 70% at 50% 0%,var(--bg2) 0%,var(--bg1) 50%,var(--bg3) 100%);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      min-height:100dvh;
      overflow:hidden;
      color:var(--ink);
      font-family:"Arial Rounded MT Bold","Trebuchet MS",system-ui,sans-serif;
      background:var(--fallback-bg);
    }
    button{font:inherit;border:0;cursor:pointer}
    .letter-rush-backdrop{
      position:fixed;
      inset:0;
      z-index:-2;
      background-image:
        linear-gradient(180deg,rgba(7,0,16,.16),rgba(7,0,16,.72)),
        var(--bg-image),
        var(--fallback-bg);
      background-size:cover,cover,cover;
      background-position:center;
      transform:scale(1.02);
    }
    .starfield{
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      overflow:hidden;
    }
    .star{
      position:absolute;
      width:2px;
      height:2px;
      border-radius:50%;
      background:#fff;
      opacity:.62;
      animation:twinkle 3s infinite;
    }
    @keyframes twinkle{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:.95;transform:scale(1.3)}}
    body.flash-good{animation:flashGood .25s}
	    body.flash-bad{animation:flashBad .35s}
	    @keyframes flashGood{0%{background:radial-gradient(ellipse 100% 70% at 50% 0%,var(--good) 0%,var(--bg2) 60%,var(--bg3) 100%)}100%{}}
	    @keyframes flashBad{0%{background:radial-gradient(ellipse 100% 70% at 50% 0%,var(--bad) 0%,var(--bg2) 60%,var(--bg3) 100%)}100%{}}
	    body.combo-rush{animation:comboRush .75s}
	    @keyframes comboRush{
	      0%{filter:saturate(1) brightness(1)}
	      35%{filter:saturate(1.65) brightness(1.18)}
	      100%{filter:saturate(1) brightness(1)}
	    }
	    body.shake{animation:bShake .3s}
    @keyframes bShake{0%,100%{transform:translate(0,0)}25%{transform:translate(-6px,2px)}75%{transform:translate(6px,-2px)}}
    .shell{
      width:min(720px,100%);
      height:100dvh;
      margin:0 auto;
      padding:18px 14px 14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      position:relative;
    }
    .hud{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      z-index:30;
    }
    .mode-pill{
      min-width:0;
      background:rgba(255,255,255,.15);
      backdrop-filter:blur(8px);
      padding:8px 14px;
      border-radius:999px;
      font-weight:1000;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      display:flex;
      align-items:center;
      gap:8px;
      box-shadow:0 4px 0 rgba(0,0,0,.22);
    }
    .mode-pill span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .coins{
      background:linear-gradient(135deg,var(--accent),#FB923C);
      color:var(--bg3);
      padding:8px 14px;
      border-radius:999px;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-weight:900;
      font-size:15px;
      box-shadow:0 4px 0 rgba(0,0,0,.3);
      display:flex;
      align-items:center;
      gap:6px;
    }
    .streak{
      width:100%;
      min-height:20px;
      font-size:13px;
      font-weight:1000;
      letter-spacing:.04em;
      color:var(--accent);
      text-align:center;
      text-shadow:0 0 12px var(--accent);
    }
    .word-card{
      width:100%;
      background:color-mix(in srgb,var(--card) 90%,#000 10%);
      border-radius:24px;
      padding:22px;
      box-shadow:0 12px 0 rgba(0,0,0,.4),0 0 60px rgba(91,33,182,.4);
      text-align:center;
      position:relative;
      z-index:20;
    }
    .def{
      min-height:36px;
      display:grid;
      place-items:center;
      color:rgba(255,255,255,.72);
      font-size:13px;
      font-weight:900;
      letter-spacing:.04em;
      line-height:1.35;
    }
    .target-row{
      margin-top:14px;
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
      min-height:60px;
    }
    .tile{
      width:48px;
      height:60px;
      border-radius:10px;
      background:rgba(255,255,255,.06);
      border:2px solid rgba(255,255,255,.15);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Georgia,"Times New Roman",serif;
      font-size:32px;
      font-weight:900;
      color:transparent;
      transition:all .18s cubic-bezier(.2,.8,.2,1.3);
      position:relative;
    }
    .tile.next{
      border-color:var(--accent);
      animation:tileNext 1.2s ease-in-out infinite;
    }
    .tile.filled{
      background:var(--good);
      border-color:#fff;
      color:var(--bg3);
      transform:translateY(-4px);
      box-shadow:0 4px 0 rgba(0,0,0,.3),0 0 20px var(--good);
    }
    .tile.visible{
      color:#fff;
      background:rgba(255,255,255,.09);
    }
    .tile.miss{
      background:var(--bad);
      border-color:#fff;
      color:#fff;
      animation:tileMiss .4s;
    }
    .trap-frame{
      min-width:min(340px,100%);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .trap-word{
      padding:12px 18px;
      border-radius:16px;
      background:rgba(255,255,255,.08);
      border:2px solid rgba(255,255,255,.18);
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(34px,8vw,56px);
      font-weight:900;
      letter-spacing:.04em;
      box-shadow:0 6px 0 rgba(0,0,0,.22);
    }
    .trap-goal{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      width:100%;
      margin-top:6px;
      color:rgba(255,255,255,.72);
      font-size:11px;
      font-weight:1000;
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .trap-dot{
      width:16px;
      height:16px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.3);
      background:rgba(255,255,255,.08);
    }
    .trap-dot.filled{
      background:var(--good);
      border-color:#fff;
      box-shadow:0 0 14px var(--good);
    }
    @keyframes tileNext{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.6)}50%{box-shadow:0 0 0 10px rgba(245,158,11,0)}}
    @keyframes tileMiss{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .speak-btn{
      appearance:none;
      margin-top:14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:12px 22px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--accent),#FB923C);
      color:var(--bg3);
      box-shadow:0 5px 0 rgba(0,0,0,.4);
      font-weight:1000;
      font-size:14px;
    }
    .type-panel{
      display:none;
      width:min(520px,100%);
      margin:16px auto 0;
      gap:10px;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
    }
    .type-panel.on{display:flex}
    .spelling-input{
      flex:1 1 230px;
      min-height:58px;
      padding:0 18px;
      border-radius:18px;
      border:3px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.95);
      color:var(--bg3);
      font-size:26px;
      font-weight:1000;
      text-align:center;
      outline:none;
      box-shadow:0 6px 0 rgba(0,0,0,.32);
    }
    .spelling-input:focus{
      border-color:var(--accent);
      box-shadow:0 6px 0 rgba(0,0,0,.32),0 0 28px rgba(245,158,11,.5);
    }
    .type-submit{
      min-height:58px;
      padding:0 22px;
      border-radius:18px;
      background:var(--good);
      color:var(--bg3);
      font-weight:1000;
      box-shadow:0 6px 0 rgba(0,0,0,.34);
    }
    .meter-wrap{
      width:100%;
      z-index:20;
    }
    .meter{
      height:18px;
      background:rgba(0,0,0,.4);
      border-radius:999px;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.15);
      position:relative;
    }
    .meter .fill{
      position:absolute;
      inset:0;
      width:0%;
      background:linear-gradient(90deg,var(--cold) 0%,var(--good) 50%,var(--accent) 80%,var(--hot) 100%);
      transition:width .25s cubic-bezier(.2,.8,.2,1);
    }
    .meter .label{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:11px;
      font-weight:1000;
      letter-spacing:.16em;
      text-transform:uppercase;
      text-shadow:0 1px 2px rgba(0,0,0,.6);
    }
    .timer-ring{
      width:100%;
      height:6px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      margin-top:8px;
      overflow:hidden;
    }
    .timer-ring .tfill{
      height:100%;
      background:var(--accent);
      width:100%;
      transition:width .1s linear;
    }
    .timer-ring.danger .tfill{
      background:var(--bad);
      box-shadow:0 0 14px var(--bad);
    }
    .mastery-hud{
      display:none;
      width:100%;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:0;
      color:#fff;
      font-weight:1000;
      font-size:14px;
      z-index:20;
    }
    .mastery-hud.on{display:flex}
    .lives-card,.stars-card,.clock-card{
      min-height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      padding:8px 14px;
      border-radius:18px;
      background:rgba(0,0,0,.48);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 5px 0 rgba(0,0,0,.28),0 0 24px rgba(245,158,11,.12);
      backdrop-filter:blur(8px);
    }
    .lives-card{
      background:linear-gradient(135deg,rgba(127,29,29,.78),rgba(31,17,71,.62));
      border-color:rgba(251,113,133,.32);
    }
    .stakes-label{
      font-size:10px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(255,255,255,.72);
    }
    .life-bank{display:flex;align-items:center;gap:6px}
    .life-token{
      width:24px;
      height:24px;
      border-radius:8px;
      display:inline-block;
      transform:rotate(45deg);
      background:linear-gradient(135deg,#FB7185,#F97316);
      box-shadow:0 0 14px rgba(251,113,133,.7),inset 0 0 0 2px rgba(255,255,255,.34);
    }
    .life-token.spent{
      background:rgba(255,255,255,.08);
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.16);
      opacity:.55;
    }
    .arena{
      flex:1;
      width:100%;
      position:relative;
      border-radius:20px;
      overflow:hidden;
      background:radial-gradient(ellipse at 50% 100%,rgba(91,33,182,.4) 0%,transparent 70%);
      min-height:280px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .falling{
      position:absolute;
      min-width:88px;
      min-height:88px;
      padding:0 18px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Georgia,"Times New Roman",serif;
      font-size:32px;
      font-weight:900;
      color:#fff;
      cursor:pointer;
      user-select:none;
      background:linear-gradient(135deg,var(--bg2),#7C3AED);
      border:2px solid rgba(255,255,255,.25);
      box-shadow:0 6px 0 rgba(0,0,0,.4),0 0 20px rgba(124,58,237,.5);
      transition:transform .12s;
      will-change:transform;
      touch-action:manipulation;
    }
    .falling.chunk{
      min-width:96px;
      letter-spacing:.04em;
    }
    .falling.tap-target-wide{
      min-width:104px;
      min-height:92px;
    }
    .falling.tap-target-default{
      min-width:92px;
      min-height:88px;
    }
    .falling::after{
      content:"";
      position:absolute;
      inset:-28px;
      border-radius:24px;
    }
    .falling:active{transform:scale(.92)}
    .falling.popped{animation:popOut .35s forwards;pointer-events:none}
    .falling.trapped{
      animation:trapSuccess .38s forwards;
      pointer-events:none;
      background:var(--good);
      color:var(--bg3);
      border-color:#fff;
    }
    .falling.zapped{animation:zap .25s forwards;pointer-events:none}
    @keyframes popOut{0%{transform:scale(1);opacity:1}100%{transform:scale(1.4);opacity:0;filter:blur(4px)}}
    @keyframes trapSuccess{
      0%{transform:scale(1);opacity:1;filter:brightness(1)}
      45%{transform:scale(1.18);opacity:1;filter:brightness(1.8);box-shadow:0 0 28px var(--good)}
      100%{transform:scale(.2) rotate(-18deg);opacity:0;filter:blur(3px)}
    }
    @keyframes zap{0%{filter:brightness(3) hue-rotate(60deg)}100%{transform:scale(.4) rotate(40deg);opacity:0}}
	    .flash-word{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(52px,13vw,86px);
      font-weight:900;
      color:#fff;
      text-shadow:0 0 40px var(--accent),0 0 80px var(--accent);
      letter-spacing:.04em;
      z-index:5;
      pointer-events:none;
	      animation:flashWord 1.2s ease-out forwards;
	    }
	    .flash-word.combo-breaker{
	      font-size:clamp(42px,10vw,78px);
	      color:#fff;
	      text-shadow:0 0 18px #fff,0 0 42px var(--accent),0 8px 0 var(--bg3);
	      animation:comboBreakerFlash 1.4s cubic-bezier(.2,.9,.2,1) forwards;
	    }
	    @keyframes flashWord{
      0%{opacity:0;transform:translate(-50%,-50%) scale(.7)}
      20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
      70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
	      100%{opacity:0;transform:translate(-50%,-50%) scale(.95);filter:blur(8px)}
	    }
	    @keyframes comboBreakerFlash{
	      0%{opacity:0;transform:translate(-50%,-50%) scale(.5) rotate(-5deg)}
	      18%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(2deg)}
	      42%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}
	      100%{opacity:0;transform:translate(-50%,-60%) scale(1.2);filter:blur(6px)}
	    }
    .banner{
      position:fixed;
      inset:0;
      z-index:60;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at 50% 50%,rgba(245,158,11,.4) 0%,rgba(7,0,16,.95) 70%);
      opacity:0;
      pointer-events:none;
      transition:opacity .3s;
    }
    .banner.on{opacity:1;pointer-events:auto}
    .banner .inner{text-align:center;animation:bannerPop .5s cubic-bezier(.2,.8,.2,1.3)}
    @keyframes bannerPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
    .banner .big{
      font-family:Georgia,"Times New Roman",serif;
      font-weight:900;
      font-size:clamp(58px,12vw,86px);
      line-height:.9;
      color:var(--accent);
      text-shadow:0 0 40px var(--accent),0 6px 0 var(--bg3);
      letter-spacing:.04em;
    }
    .banner .sub{
      margin-top:14px;
      font-size:18px;
      font-weight:1000;
      color:#fff;
      letter-spacing:.1em;
      text-transform:uppercase;
    }
	    .banner button{
	      margin-top:20px;
	      background:var(--accent);
	      color:var(--bg3);
	      padding:16px 32px;
      border-radius:999px;
      font-weight:1000;
	      font-size:16px;
	      box-shadow:0 6px 0 rgba(0,0,0,.4);
	    }
	    .banner button.secondary{
	      margin-left:10px;
	      background:rgba(255,255,255,.12);
	      color:#fff;
	      box-shadow:0 6px 0 rgba(0,0,0,.28);
	      border:1px solid rgba(255,255,255,.18);
	    }
    .coin{
      position:fixed;
      width:30px;
      height:30px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#FBBF24,#D97706);
      box-shadow:0 0 12px var(--accent);
      z-index:55;
      pointer-events:none;
      animation:coinFly 1s ease-out forwards;
    }
    @keyframes coinFly{0%{transform:translate(0,0) scale(.4);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1) rotate(360deg);opacity:0}}
    .debug-stream{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:31;
      width:min(320px,calc(100vw - 28px));
      max-height:34vh;
      overflow:auto;
      border-radius:14px;
      padding:12px;
      background:rgba(15,18,26,.92);
      border:1px solid rgba(158,230,196,.3);
      color:#9ee6c4;
      font:10px/1.45 ui-monospace,monospace;
    }
    .debug-stream[hidden]{display:none}
    .demo-panel{
      position:absolute;
      inset:18px;
      z-index:12;
      display:grid;
      place-items:center;
      border-radius:22px;
      background:rgba(7,0,16,.86);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 12px 0 rgba(0,0,0,.34),0 0 40px rgba(245,158,11,.2);
      text-align:center;
      padding:18px;
    }
    .demo-panel h2{
      margin:0 0 8px;
      font-size:18px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--accent);
    }
    .demo-panel p{
      margin:0 auto 16px;
      max-width:420px;
      color:rgba(255,255,255,.78);
      font-weight:900;
      line-height:1.35;
    }
    .demo-chips{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin:12px 0 18px;
    }
    .demo-chip{
      min-width:70px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      box-shadow:0 5px 0 rgba(0,0,0,.28);
      font-family:Georgia,"Times New Roman",serif;
      font-size:28px;
      font-weight:900;
    }
    .demo-chip.safe{border:2px solid var(--good)}
    .demo-chip.bad{border:2px solid var(--bad)}
    .demo-panel button{
      border-radius:999px;
      padding:13px 24px;
      color:var(--bg3);
      background:var(--accent);
      font-weight:1000;
      box-shadow:0 5px 0 rgba(0,0,0,.36);
    }
    @media (max-width:640px){
      .shell{padding:12px 10px 10px;gap:9px}
      .hud{gap:6px}
      .mode-pill{font-size:10px;padding:8px 10px}
      .coins{font-size:12px;padding:8px 10px}
      .word-card{padding:16px;border-radius:20px}
      .tile{width:40px;height:52px;font-size:27px}
      .falling{min-width:82px;min-height:82px;font-size:29px}
      .arena{min-height:250px}
    }
  </style>
</head>
<body>
  <div class="letter-rush-backdrop"></div>
  <div class="starfield" id="starfield" aria-hidden="true"></div>
  <main class="shell">
    <header class="hud">
      <div class="mode-pill"><span id="modeEmoji">🔊</span><span id="modeName">Hear &amp; Spell</span></div>
      <div class="coins"><span>🪙</span><span id="coins">0</span></div>
    </header>
    <div class="streak" id="streak"></div>

    <section class="word-card" aria-live="polite">
      <div class="def" id="definition">Loading word list...</div>
      <div class="target-row" id="targetRow"></div>
      <button class="speak-btn" id="speakBtn" type="button">🔊 Hear it again</button>
      <form class="type-panel" id="typeWordPrompt">
        <input class="spelling-input" id="spellingInput" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Type the spelling word" />
        <button class="type-submit" id="submitTypedAnswer" type="submit">Lock it</button>
      </form>
    </section>

    <section class="meter-wrap" aria-label="Progress">
      <div class="meter"><div class="fill" id="meterFill"></div><div class="label" id="meterLabel">STAKE METER</div></div>
      <div class="timer-ring" id="timerRing"><div class="tfill" id="timerFill"></div></div>
    </section>

    <section class="mastery-hud" id="masteryHud">
      <div class="lives-card" aria-label="Mastery lives">
        <span class="stakes-label">Lives</span>
        <span class="life-bank" id="masteryLives"></span>
      </div>
      <div class="stars-card"><span class="stakes-label">Stars</span><span>⭐ <span id="masteryStars">0</span></span></div>
      <div class="clock-card"><span class="stakes-label">Time</span><span id="masteryTimer">4.0s</span></div>
    </section>

    <section class="arena" id="arena" aria-label="Letter arena"></section>

        emitTargetResult(word, finalCorrect, state.typed.join(""), finalCorrect ? null : reason || "letter_sequence_miss");
        state.completedWordIds.push(word.id || normalizeWord(word.text));
        updateHud();
        if (!finalCorrect) {
          retrySameWordAfterMiss(reason || "letter_sequence_miss");
          return;
        }
        var outcome = wordOutcomeCopy(word);
        byId("jackpotBig").textContent = outcome.title;
        byId("jackpotSub").textContent = outcome.subtitle;
        byId("nextBtn").textContent = outcome.button;
        setBanner("jackpotBanner", true);
      }
      function wordOutcomeCopy(word) {
        var label = word.text.toUpperCase();
        return {
          title: "WORD!",
          subtitle: "+" + (80 + state.streak * 3) + " coins · " + label,
          button: "Next word →"
        };
      }
      function emitBonusEvent(type, extra) {
        var payload = Object.assign({
          type: type,
          activityId: "letter-rush",
          nodeId: params.nodeId,
          mode: config.mode,
          stake: state.bonusStake,
          coins: state.coins
        }, extra || {});
        postActivityEvent(payload);
        fireCompanion(type, payload);
      }
      function currentAccuracy() {
        var scored = state.targetResults.filter(function (row) { return typeof row.correct === "boolean"; });
        if (!scored.length) return 0;
        return scored.filter(function (row) { return row.correct; }).length / scored.length;
      }
      function shouldOfferBonusRound() {
        var bonus = bonusRoundSettings();
        if (!isTrapMode() || !bonus.enabled) return false;
        if (state.bonusRoundOffered || state.bonusRoundResolved || state.bonusRoundActive) return false;
        if (state.targetResults.length === 0) return false;
        if (bonus.stake > 0 && state.coins < bonus.stake) return false;
        return currentAccuracy() >= bonus.unlockAccuracy || state.normalRoundStreakPeak >= bonus.unlockStreak;
      }
      function showBonusOffer() {
        var bonus = bonusRoundSettings();
        state.bonusRoundOffered = true;
        byId("bonusBig").textContent = "BONUS?";
        byId("bonusSub").textContent = "Risk " + bonus.stake + " coins · win " + Math.round(bonus.stake * bonus.multiplier);
        setBanner("bonusBanner", true);
        emitBonusEvent("bonus_round_unlocked", {
          unlockAccuracy: bonus.unlockAccuracy,
          unlockStreak: bonus.unlockStreak,
          accuracy: currentAccuracy(),
          peakStreak: state.normalRoundStreakPeak
        });
        postGameStateUpdate({
          phase: "bonus_round_unlocked",
          activityId: "letter-rush",
          nodeId: params.nodeId,
          mode: config.mode,
          coins: state.coins
        });
        report("Letter Rush bonus round unlocked", { lastAction: "bonus_round_unlocked" });
      }
      function selectBonusWord() {
        var words = Array.isArray(config.words) && config.words.length ? config.words : [{ text: "farmer", targetPatterns: ["er-ending"] }];
        return words[Math.floor(Math.random() * words.length)];
      }
      function beginBonusRound() {
        var bonus = bonusRoundSettings();
        setBanner("bonusBanner", false);
        state.bonusRoundActive = true;
        state.bonusRoundResolved = false;
        state.bonusStake = Math.min(state.coins, bonus.stake);
        state.bonusPayout = 0;
        state.coins = Math.max(0, state.coins - state.bonusStake);
        state.word = selectBonusWord();
        state.trapRound = buildTrapRound(state.word);
        state.targetLetters = [];
        state.typed = [];
        state.trapHits = 0;
        state.wordHadMiss = false;
        state.wordOutcomeLocked = false;
        state.wordStartedAt = 0;
        state.currentLetterStartedAt = 0;
        state.trapDeadline = 0;
        state.paused = true;
        byId("arena").innerHTML = "";
        byId("definition").textContent = "Bonus run: trap imposters fast. Let the safe chunk pass.";
        resetTrapTimerDisplay();
        renderTiles();
        updateHud();
        playConfiguredSfxEvent("bonusStart");
        emitBonusEvent("bonus_round_started", {
          goal: state.trapRound.goal,
          timerSeconds: bonus.timerSeconds,
          multiplier: bonus.multiplier,
          riskSource: bonus.riskSource
        });
        postGameStateUpdate({
          phase: "bonus_round_started",
          activityId: "letter-rush",
          nodeId: params.nodeId,
          mode: config.mode,
          stake: state.bonusStake,
          coins: state.coins
        });
        report("Letter Rush bonus round started", { lastAction: "bonus_round_started" });
        state.promptTimer = setTimeout(startWordPlay, 500);
      }
      function completeBonusRound(correct, reason) {
        var bonus = bonusRoundSettings();
        state.bonusRoundActive = false;
        state.bonusRoundResolved = true;
        state.paused = true;
        stopWordTimers();
        byId("arena").innerHTML = "";
        state.bonusPayout = correct ? Math.round(state.bonusStake * bonus.multiplier) : 0;
        if (state.bonusPayout > 0) {
          state.coins += state.bonusPayout;
          playConfiguredSfxEvent("bonusWin");
        }
        emitBonusEvent("bonus_round_complete", {
          correct: !!correct,
          reason: reason || null,
          payout: state.bonusPayout,
          net: state.bonusPayout - state.bonusStake,
          target: companionVisibleWord()
        });
        postGameStateUpdate({
          phase: "bonus_round_complete",
          activityId: "letter-rush",
          nodeId: params.nodeId,
          mode: config.mode,
          correct: !!correct,
          stake: state.bonusStake,
          payout: state.bonusPayout,
          coins: state.coins
        });
        finishSession();
      }
      function skipBonusRound() {
        state.bonusRoundResolved = true;
        setBanner("bonusBanner", false);
        emitBonusEvent("bonus_round_skipped", { payout: 0, net: 0 });
        report("Letter Rush bonus round skipped", { lastAction: "bonus_round_skipped" });
        finishSession();
      }
      function retrySameWordAfterMiss(reason) {
        var cue = reason === "timeout" || reason === "trap_timer_timeout" ? "TIME!" : "MISS";
        flashWord(cue);
        flashCompanion("Same word. Keep going.");
        report("Letter Rush miss same-word retry", { correct: false, lastAction: "word_missed", reason: reason });
        setTimeout(function () {
          if (config.mode === "mastery-run" && state.lives <= 0) {
            finishSession();
            return;
          }
          beginWord();
        }, 650);
      }
      function advanceToNextWord() {
        setBanner("jackpotBanner", false);
        state.index += 1;
        if (state.index >= roundCount()) {
          if (shouldOfferBonusRound()) {
            showBonusOffer();
            return;
          }
          finishSession();
          return;
        }
        beginWord();
      }
      function nextWord() {
        advanceToNextWord();
      }
      function beginWord() {
        // beginWord does not reset mastery lives; lives belong to the whole session.
        state.word = config.words[state.index];
        state.trapRound = isTrapMode() ? buildTrapRound(state.word) : null;
        state.targetLetters = isTrapMode() ? [] : normalizeWord(state.word.text).split("");
        state.typed = [];
        state.trapHits = 0;
        state.wordHadMiss = false;
        state.wordOutcomeLocked = false;
        state.wordStartedAt = 0;
        state.currentLetterStartedAt = 0;
        state.paused = true;
        byId("arena").innerHTML = "";
        byId("typeWordPrompt").classList.remove("on");
        byId("spellingInput").value = "";
        byId("definition").textContent = visiblePromptForWord(state.word);
        resetMasteryTimerDisplay();
        resetTrapTimerDisplay();
        renderTiles();
        updateHud();
        if (config.mode === "read-and-race") flashWord(state.word.text);
        var promptDelay =
          config.mode === "type-and-spell" || config.mode === "hear-and-spell" || config.mode === "mastery-run"
            ? requestNarration("word_prompt")
            : 650;
        flashCompanion(modeDef().intro);
        fireCompanion("activity_started", {
          activityId: "letter-rush",
          mode: config.mode,
          target: companionVisibleWord(),
          itemIndex: state.index,
          totalItems: roundCount()
        });
        report("Letter Rush word " + (state.index + 1) + " prompted", { lastAction: "word_prompted" });
        state.promptTimer = setTimeout(startWordPlay, promptDelay);
      }
      function startWordPlay() {
        if (!state.word || !state.paused) return;
        state.paused = false;
        state.wordStartedAt = Date.now();
        state.currentLetterStartedAt = Date.now();
        if (config.mode === "type-and-spell") {
          byId("typeWordPrompt").classList.add("on");
          byId("spellingInput").focus();
          report("Letter Rush typed word started", { lastAction: "type_word_started" });
          return;
        }
        if (config.mode === "mastery-run") {
          state.masteryDeadline = Date.now() + masteryWordDurationMs();
          tickMasteryTimer();
        }
        if (isTrapMode()) {
          var trapDuration = trapWordDurationMs();
          if (trapDuration > 0) {
            state.trapDeadline = Date.now() + trapDuration;
            tickTrapTimer();
          }
        }
        report("Letter Rush word " + (state.index + 1) + " started", { lastAction: "word_started" });
        startSpawning();
      }
      function submitTypedAnswer(event) {
        if (event && event.preventDefault) event.preventDefault();
        if (state.paused || !state.word || config.mode !== "type-and-spell") return;
        var attempted = normalizeWord(byId("spellingInput").value);
        var expected = normalizeWord(state.word.text);
        if (!attempted) {
          playConfiguredSfxEvent("prompt");
          return;
        }
        byId("typeWordPrompt").classList.remove("on");
        state.typed = attempted.split("");
        if (attempted === expected) {
          addCorrectStreak("typed_word_correct");
          state.coins += 40 + Math.min(60, state.streak * 4);
          renderTiles();
          completeWord(true);
          return;
        }
        state.wordHadMiss = true;
        breakStreak("typed_miss");
        document.body.classList.add("shake", "flash-bad");
        setTimeout(function () { document.body.classList.remove("shake", "flash-bad"); }, 260);
        completeWord(false, "typed_spelling_miss");
      }
	      function flashWord(word, extraClass) {
	        var el = document.createElement("div");
	        el.className = "flash-word" + (extraClass ? " " + extraClass : "");
	        el.textContent = String(word || "").toUpperCase();
        byId("arena").appendChild(el);
        setTimeout(function () { el.remove(); }, 1300);
      }
      function runTrapDemo() {
        state.demoSeen = true;
        state.paused = true;
        byId("arena").innerHTML = "";
        var demoWord = config.words[0] || { text: "farmer", traps: ["farmar", "farmor"], targetPatterns: ["er-ending"] };
        var round = buildTrapRound(demoWord);
        postActivityEvent({
          type: "trap_demo_started",
          activityId: "letter-rush",
          nodeId: params.nodeId,
          mode: config.mode,
          target: demoWord.text,
          correctChunk: round.correctChunk,
          imposterChunks: round.imposterChunks.slice()
        });
        fireCompanion("trap_demo_started", {
          activityId: "letter-rush",
          mode: config.mode,
          correctChunk: round.correctChunk,
          imposterChunks: round.imposterChunks.slice()
        });
        byId("definition").textContent = "Trap the wrong ending. Let " + round.correctChunk.toUpperCase() + " pass.";
        byId("targetRow").innerHTML = '<div class="trap-frame"><span class="trap-word">' + round.frame.toUpperCase() + '</span><div class="trap-goal">Demo first</div></div>';
        var panel = document.createElement("div");
        panel.className = "demo-panel";
        panel.innerHTML = '<div><h2>Demo</h2><p>Trap imposters. Let the correct chunk pass.</p><div class="demo-chips"><span class="demo-chip safe">' + round.correctChunk.toUpperCase() + ' ✓ safe</span><span class="demo-chip bad">' + round.imposterChunks[0].toUpperCase() + ' trap</span><span class="demo-chip bad">' + round.imposterChunks[1].toUpperCase() + ' trap</span></div><button type="button">Start real round</button></div>';
        byId("arena").appendChild(panel);
        panel.querySelector("button").addEventListener("click", function () {
          playConfiguredSfxEvent("start");
          byId("arena").innerHTML = "";
          postActivityEvent({
            type: "trap_demo_complete",
            activityId: "letter-rush",
            nodeId: params.nodeId,
            mode: config.mode,
            demoSeen: state.demoSeen
          });
          fireCompanion("trap_demo_complete", {
            activityId: "letter-rush",
            mode: config.mode,
            demoSeen: state.demoSeen
          });
          beginWord();
        });
      }
      function finishSession() {
        state.paused = true;
        stopWordTimers();
        if (heartbeat) clearInterval(heartbeat);
        byId("arena").innerHTML = "";
        var correctCount = state.targetResults.filter(function (row) { return row.correct; }).length;
        var accuracy = state.targetResults.length ? correctCount / state.targetResults.length : 0;
        if (!state.currencyAwardSent && state.coins !== 0) {
          state.currencyAwardSent = true;
          postCurrencyAward(state.coins, state.bonusRoundResolved ? "letter_rush_bonus_round" : "letter_rush_session");
        }
        var completeEvent = {
          type: "activity_complete",
          activityId: "letter-rush",
          nodeId: params.nodeId,
          completed: true,
          accuracy: accuracy,
          mode: config.mode,
          masteryEligible: canWriteMasteryEvidence(),
          targetResults: state.targetResults.slice()
        };
        postActivityEvent(completeEvent);
        // GameBridge.complete is invoked by sendNodeComplete for the shared iframe contract.
        sendNodeComplete({
          completed: true,
          accuracy: accuracy,
          flaggedWords: state.targetResults.filter(function (row) { return !row.correct; }).map(function (row) { return row.target; }),
          wordsCorrect: state.targetResults.filter(function (row) { return row.correct; }).map(function (row) { return row.target; }),
          wordsStruggled: state.targetResults.filter(function (row) { return !row.correct; }).map(function (row) { return row.target; }),
          xpEarned: Math.round(accuracy * 60 + state.coins / 20),
          timeSpent_ms: state.targetResults.reduce(function (sum, row) { return sum + (Number(row.responseTime_ms) || 0); }, 0),
          wordsAttempted: state.targetResults.length,
          activityId: "letter-rush",
          mode: config.mode,
          purpose: modeDef().purpose,
          bonusRound: {
            offered: state.bonusRoundOffered,
            resolved: state.bonusRoundResolved,
            stake: state.bonusStake,
            payout: state.bonusPayout
          },
          targetResults: state.targetResults,
          letterResults: state.letterResults
        });
        fireCompanion("activity_complete", {
          activityId: "letter-rush",
          mode: config.mode,
          accuracy: accuracy,
          masteryEligible: canWriteMasteryEvidence()
        });
        byId("endSub").textContent = correctCount + " of " + state.targetResults.length + " words solved";
        setBanner("jackpotBanner", false);
        setBanner("bonusBanner", false);
        setBanner("endBanner", true);
      }
      function validateRuntimeConfig(candidate) {
        if (!candidate || typeof candidate !== "object") return sampleConfig("sample");
        var mode = candidate.mode;
        if (!LETTER_RUSH_MODES[mode]) candidate.mode = "hear-and-spell";
        if (!Array.isArray(candidate.words) || candidate.words.length === 0) candidate.words = sampleConfig("sample").words;
        candidate.scaffolds = candidate.scaffolds || {};
        candidate.demo = !!candidate.demo;
        candidate.trap = candidate.trap || sampleConfig("sample-trap").trap;
        candidate.bonusRound = candidate.bonusRound || sampleConfig("sample-trap").bonusRound;
        candidate.sfx = candidate.sfx || sampleConfig("sample-trap").sfx;
        candidate.evidencePolicy = candidate.evidencePolicy || {
          writesPracticeEvidence: true,
          writesMasteryEvidence: isMasteryEligibleMode(candidate.mode),
          requiresPerTargetResult: true,
          allowedEvidence: isMasteryEligibleMode(candidate.mode) ? ["practice", "mastery"] : ["practice"]
        };
        return candidate;
      }
      function sampleConfig(key) {
        var mode = key === "sample-easy" ? "read-and-race"
          : key === "sample-medium" ? "hear-and-spell"
            : key === "sample-hard" ? "mastery-run"
              : key === "sample-support" ? "type-and-spell"
                : key === "sample-complete" ? "mastery-run"
                  : key === "sample-type" ? "type-and-spell"
          : key === "sample-read" ? "read-and-race"
          : key === "sample-trap" ? "trap-the-imposter"
            : key === "sample-mastery" ? "mastery-run"
              : "hear-and-spell";
        return {
          schemaVersion: 1,
          activityId: "letter-rush",
          mode: mode,
          demo: mode === "trap-the-imposter",
          topic: "Week 5 spelling",
          domain: "spelling",
          learningGoal: "Build fast, accurate spelling recall from the weekly list.",
          gradeBand: "early_elementary",
          trap: {
            goal: 4,
            timerSeconds: 20,
            imposterSpawnRate: 0.76,
            maxVisibleChunks: 5,
            spawnInterval_ms: 780,
            fallDuration_ms: 4100
          },
          bonusRound: {
            enabled: true,
            unlockAccuracy: 0.8,
            unlockStreak: 4,
            goal: 5,
            timerSeconds: 12,
            imposterSpawnRate: 0.84,
            maxVisibleChunks: 6,
            spawnInterval_ms: 620,
            fallDuration_ms: 3300,
            speedMultiplier: 1.25,
            stake: 20,
            multiplier: 3,
            riskSource: "session_earnings"
          },
          sfx: {
            enabled: true,
            arcadeCombos: true,
            comboThreshold: 3,
            heatingUpEvery: 5,
            comboBreakerStreak: 8,
            comboBreakerEvery: 5,
            comboMilestoneEvery: 5,
            comboVolume: 0.9,
            comboBreakerSrc: "/sfx/pronunciation/combo_breaker.mp3",
            eventMap: {
              start: { effect: "start" },
              prompt: { effect: "prompt-chime" },
              correct: { effect: "letter-correct" },
              combo: { effect: "combo" },
              heatingUp: { effect: "heating-up" },
              wordClear: { effect: "word-clear" },
              lifeLost: { effect: "life-lost" },
              bonusStart: { effect: "heating-up" },
              bonusWin: { effect: "word-clear" }
            },
            comboMilestones: [
              { minStreak: 5, label: "COMBO BREAKER!", effect: "combo-breaker", src: "/sfx/pronunciation/combo_breaker.mp3" },
              { minStreak: 10, label: "ON FIRE!", effect: "on-fire" },
              { minStreak: 15, label: "MEGA STREAK!", effect: "mega-streak" },
              { minStreak: 20, label: "LEGENDARY!", effect: "legendary" }
            ]
          },
          appearance: {
            palette: { bg1: "#1B0B3A", bg2: "#5B21B6", bg3: "#070010", accent: "#F59E0B" },
            backgroundImage: "",
            fallbackBackground: "radial-gradient(ellipse 100% 70% at 50% 0%, #5B21B6 0%, #1B0B3A 50%, #070010 100%)"
          },
          feedback: {
            positiveByMode: {
	              "hear-and-spell": ["NICE!", "CLEAR!", "GOT IT!", "YES!"],
              "type-and-spell": ["LOCKED!", "CLEAN!", "YES!", "GOT IT!"],
	              "read-and-race": ["GO!", "FAST!", "ZIP!", "NICE!"],
              "trap-the-imposter": ["TRAP!", "SNAGGED!", "CAUGHT!"],
              "mastery-run": ["HIT!", "LOCKED!", "CLEAN!", "NICE!"]
            }
          },
          scaffolds: {
            showWord: mode === "read-and-race",
            letterBank: false,
            allowRetryBeforeScore: mode !== "mastery-run",
            companionHints: false
          },
          words: [
            { id: "farmer", text: "farmer", definition: "A person who grows food or raises animals.", sentence: "The farmer planted seeds.", traps: ["farmar", "farmor"], imposterChunks: ["ar", "or", "ur", "ir"], targetPatterns: ["er-ending"] },
            { id: "sailor", text: "sailor", definition: "A person who works on a boat.", sentence: "The sailor tied the rope.", traps: ["sailer", "sailar"], imposterChunks: ["er", "ar", "ur", "ir"], targetPatterns: ["or-ending"] },
            { id: "teacher", text: "teacher", definition: "A person who helps students learn.", sentence: "The teacher read the class a story.", traps: ["teachar", "teachor"], imposterChunks: ["ar", "or", "ur", "ir"], targetPatterns: ["er-ending"] },
            { id: "doctor", text: "doctor", definition: "A person who helps people feel better.", sentence: "The doctor checked the patient.", traps: ["docter", "doctar"], imposterChunks: ["er", "ar", "ur", "ir"], targetPatterns: ["or-ending"] }
          ],
          evidencePolicy: {
            writesPracticeEvidence: true,
            writesMasteryEvidence: isMasteryEligibleMode(mode),
            requiresPerTargetResult: true,
            allowedEvidence: isMasteryEligibleMode(mode) ? ["practice", "mastery"] : ["practice"]
          }
        };
      }
      function start(loaded) {
        config = validateRuntimeConfig(loaded);
        applyBackground();
        configureStandalonePreview();
        makeStars();
        var def = modeDef();
        byId("modeEmoji").textContent = def.emoji;
        byId("modeName").textContent = def.label;
        byId("startSub").textContent = def.label + " · " + (config.topic || "Spelling");
        byId("speakBtn").style.display = (config.mode === "type-and-spell" || config.mode === "hear-and-spell" || config.mode === "mastery-run") ? "inline-flex" : "none";
        byId("masteryHud").classList.toggle("on", config.mode === "mastery-run");
        byId("definition").textContent = def.intro;
        updateHud();
        applyStorybookFixtureState();
        heartbeat = window.GameBridge && window.GameBridge.startHeartbeat
          ? window.GameBridge.startHeartbeat(function () {
              return "Letter Rush active: " + config.mode;
            }, function () {
              return {
                phase: state.paused ? "paused" : "playing",
                activityId: "letter-rush",
                mode: config.mode,
                currentWord: companionVisibleWord(),
                itemIndex: state.index,
                totalItems: roundCount(),
                score: state.coins
              };
            })
          : null;
      }
      function applyStorybookFixtureState() {
        if (!storybookPreview) return;
        document.body.setAttribute("data-fixture-state", storybookFixtureState || "easy");
        if (storybookFixtureState === "support") {
          byId("definition").textContent = "Storybook support fixture: slow down, use the letter bank, and recover.";
        }
        if (storybookFixtureState !== "complete") return;
        state.started = true;
        state.paused = true;
        state.targetResults = config.words.map(function (word) {
          return {
            target: normalizeWord(word.text),
            correct: true,
            responseTime_ms: 1200,
            mode: config.mode,
            reason: "storybook_complete_fixture"
          };
        });
        state.coins = state.targetResults.length * 100;
        updateHud();
        byId("endSub").textContent = state.targetResults.length + " of " + state.targetResults.length + " words solved";
        setBanner("startBanner", false);
        setBanner("endBanner", true);
      }
      function loadConfig() {
        if (!configUrl || configUrl.indexOf("sample") === 0) {
          start(sampleConfig(configUrl || "sample-mastery"));
          return;
        }
        fetch(configUrl)
          .then(function (res) {
            if (!res.ok) throw new Error("config " + res.status);
            return res.json();
          })
          .then(start)
          .catch(function (err) {
            console.error("Letter Rush config failed", err);
            start(sampleConfig("sample"));
          });
      }

      byId("startBtn").addEventListener("click", function () {
        if (state.started) return;
        playConfiguredSfxEvent("start");
        state.started = true;
        setBanner("startBanner", false);
        resetSessionState();
        fireCompanion("activity_started", { activityId: "letter-rush", mode: config.mode, totalItems: roundCount() });
        if (isTrapMode() && config.demo && !state.demoSeen) {
          runTrapDemo();
          return;
        }
        beginWord();
      });
      byId("nextBtn").addEventListener("click", nextWord);
      byId("doneBtn").addEventListener("click", backToMap);
      byId("bonusStartBtn").addEventListener("click", beginBonusRound);
      byId("bonusSkipBtn").addEventListener("click", skipBonusRound);
      byId("speakBtn").addEventListener("click", function () { requestNarration("repeat_word"); });
      byId("typeWordPrompt").addEventListener("submit", submitTypedAnswer);

      loadConfig();
    })();
  </script>
</body>
