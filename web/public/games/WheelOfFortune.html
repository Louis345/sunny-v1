<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════════════════════════════════
   GAME PARAMS
═══════════════════════════════════════════════════════════════════ */
const GP = window.GAME_PARAMS || {};
const WORD_RAW = (GP.words?.[0] ?? 'rabbit').toLowerCase().replace(/[^a-z]/g, '');
const LETTERS = WORD_RAW.toUpperCase().split('');
const CHILD_ID = GP.childId ?? 'unknown';
const COMPANION_ID = GP.companion ?? 'companion';
const CHILD_NAME_RAW = typeof GP.childName === 'string' ? GP.childName.trim() : '';
const COMPANION_NAME_RAW = typeof GP.companionName === 'string' ? GP.companionName.trim() : '';
const THEME_ID = GP.theme ?? 'cosmos';
const CATEGORY = GP.category ?? 'Spelling';
const COMPANION_START_COINS = GP.companionCoins ?? 600;
/** Persisted profile balance passed on iframe URL (_contract.js) — child score starts here, not at 0. */
const PROFILE_COMPANION_CURRENCY = Math.max(
  0,
  Math.floor(Number(GP.companionCurrency ?? 0) || 0),
);

function wofSessionCoinDelta(totalCoins) {
  return Math.max(0, Math.floor(Number(totalCoins) || 0) - PROFILE_COMPANION_CURRENCY);
}

if (CHILD_ID === 'ila' || GP.dyslexiaMode === true) {
  document.body.classList.add('dyslexia');
}

function displayNameFromId(raw, fallback) {
  const v = String(raw || '').trim();
  if (!v) return fallback;
  if (v.toLowerCase() === 'off') return fallback;
  return v.charAt(0).toUpperCase() + v.slice(1);
}

const CHILD_NAME = CHILD_NAME_RAW || displayNameFromId(CHILD_ID, 'Child');
const COMPANION_NAME = COMPANION_NAME_RAW || displayNameFromId(COMPANION_ID, 'Companion');
const COMPANION_SPINS_LABEL = `${COMPANION_NAME.slice(0, 8).toUpperCase()}\nSPINS`;

if (!CHILD_NAME_RAW || !COMPANION_NAME_RAW) {
  console.warn(
    'WheelOfFortune: missing childName/companionName in GAME_PARAMS; using id-derived fallbacks.',
    {
      childName: CHILD_NAME_RAW,
      companionName: COMPANION_NAME_RAW,
      childId: CHILD_ID,
      companion: COMPANION_ID,
    },
  );
}

function fireComp(trigger, payload) {
  if (typeof window.fireCompanionEvent === 'function') {
    window.fireCompanionEvent(trigger, payload || {});
  }
}

function reportGameState(message, extras) {
  if (window.GameBridge && typeof window.GameBridge.reportState === 'function') {
    window.GameBridge.reportState(message, extras || {});
  }
}

function reportGameAction(action, message, snapshot) {
  if (window.GameBridge && typeof window.GameBridge.reportAction === 'function') {
    window.GameBridge.reportAction(action, message, snapshot || {});
    return;
  }
  reportGameState(message, Object.assign({}, snapshot || {}, {
    action: action,
    lastAction: (snapshot && snapshot.lastAction) || action,
  }));
}

function boardStateStr(letters, revealed) {
  return letters.map(function(l, i) { return revealed.has(i) ? l.toUpperCase() : '_'; }).join(' ');
}

const COIN_VALUES = { '100':100, '200':200, '250':250, '300':300, '350':350, '400':400, '500':500 };
function wheelLandDescription(segLabel) {
  if (segLabel === 'BANKRUPT') {
    return COMPANION_NAME + " lost all their coins. " + CHILD_NAME + "'s coins are safe.";
  }
  if (segLabel === 'FREE\nLETTER') {
    return "A free letter will be revealed.";
  }
  if (segLabel === COMPANION_SPINS_LABEL) {
    return COMPANION_NAME + " gets to pick the next letter.";
  }
  if (COIN_VALUES[segLabel] != null) {
    return "Worth " + segLabel + " coins. Child picks a letter.";
  }
  return "Child continues.";
}
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

/* ═══════════════════════════════════════════════════════════════════
   SOUND ENGINE  — all synthesis, no files
═══════════════════════════════════════════════════════════════════ */
class SoundEngine {
  constructor() { this._ctx = null; }

  get ctx() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (this._ctx.state === 'suspended') this._ctx.resume();
    return this._ctx;
  }

  /* ── core helpers ── */
  _osc(freq, type, dur, vol, when, freqEnd) {
    const ctx = this.ctx;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, when);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, when + dur * 0.9);
    g.gain.setValueAtTime(vol, when);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(when); o.stop(when + dur + 0.02);
  }

  _noise(dur, vol, filterFreq, filterType, when) {
    const ctx = this.ctx;
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++)
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * dur * 0.3));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = filterType || 'bandpass';
    f.frequency.value = filterFreq || 2000;
    f.Q.value = 1.8;
    const g = ctx.createGain();
    g.gain.value = vol;
    src.connect(f); f.connect(g); g.connect(ctx.destination);
    src.start(when); return src;
  }

  /* ── wheel tick (physical detent) ── */
  _tick(when, vol = 0.22) {
    const ctx = this.ctx;
    const n = this._noise(0.018, vol, 2200, 'highpass', when);
    this._osc(180, 'sine', 0.025, vol * 0.6, when);
  }

  /* ── spin sequence: schedules all ticks + calls onLand after dur ── */
  spinSequence(dur = 3.2, onLand) {
    const ctx = this.ctx;
    const t0 = ctx.currentTime + 0.05;
    const totalTicks = 52;
    // tick times follow an ease-in-out profile: slow → fast → slow
    for (let i = 0; i < totalTicks; i++) {
      const p = i / totalTicks;
      // cumulative position on ease-in-out curve
      const ease = p < 0.5
        ? 2 * p * p
        : 1 - Math.pow(-2 * p + 2, 2) / 2;
      const tickTime = t0 + ease * dur * 0.92;
      const vol = p > 0.75 ? 0.18 + (p - 0.75) * 0.5 : 0.18;
      this._tick(tickTime, vol);
    }
    // Final heavy land thud
    const land = t0 + dur * 0.93;
    this._osc(110, 'sine', 0.22, 0.9, land, 35);
    this._osc(220, 'sine', 0.15, 0.5, land, 60);
    this._tick(land, 0.55);
    this._tick(land + 0.015, 0.35);
    setTimeout(() => { if (onLand) onLand(); }, dur * 1000);
  }

  /* ── spin whoosh ── */
  spinWhoosh() {
    const ctx = this.ctx;
    const t = ctx.currentTime;
    this._noise(0.45, 0.38, 3800, 'bandpass', t);
    this._osc(280, 'sawtooth', 0.35, 0.18, t, 60);
  }

  /* ── BANKRUPT — dramatic descending wah-wah ── */
  bankrupt() {
    const ctx = this.ctx;
    const t = ctx.currentTime + 0.05;
    // Initial shocked sting
    this._osc(1047, 'square', 0.07, 0.28, t);
    this._osc(784, 'square', 0.07, 0.22, t + 0.07);
    this._osc(523, 'square', 0.07, 0.18, t + 0.14);
    // Descending trombone wah
    this._osc(440, 'sawtooth', 0.55, 0.55, t + 0.25, 65);
    this._osc(330, 'sawtooth', 0.6,  0.42, t + 0.55, 45);
    this._osc(55,  'sawtooth', 0.7,  0.45, t + 0.7,  28);
    // Low rumble for drama
    this._osc(40, 'sine', 0.8, 0.35, t + 0.6);
    // Glitch stutter
    for (let i = 0; i < 5; i++) {
      this._osc(300 - i * 40, 'square', 0.06, 0.14, t + 0.22 + i * 0.065);
    }
  }

  /* ── letter reveal — bright ascending ping ── */
  letterReveal() {
    const ctx = this.ctx;
    const t = ctx.currentTime;
    this._osc(880,  'sine', 0.22, 0.38, t);
    this._osc(1320, 'sine', 0.16, 0.25, t + 0.04);
    this._osc(1760, 'sine', 0.10, 0.18, t + 0.08);
    this._osc(2093, 'sine', 0.06, 0.12, t + 0.12);
  }

  /* ── letter button tap ── */
  buttonTap() {
    const ctx = this.ctx;
    const t = ctx.currentTime;
    this._osc(660, 'sine', 0.10, 0.22, t);
    this._osc(880, 'sine', 0.07, 0.10, t + 0.02);
  }

  /* ── coin tinkle ── */
  coin(when) {
    const t = when != null ? when : this.ctx.currentTime;
    const f = 1100 + Math.random() * 700;
    this._osc(f,       'sine', 0.20, 0.28, t);
    this._osc(f * 1.5, 'sine', 0.10, 0.12, t + 0.03);
    this._osc(f * 2,   'sine', 0.06, 0.08, t + 0.06);
  }

  /* ── SOLVE fanfare ── */
  fanfare() {
    const ctx = this.ctx;
    const t = ctx.currentTime + 0.05;
    // Ascending arpeggio
    const notes = [523, 659, 784, 880, 1047, 1319, 1568, 2093];
    notes.forEach((freq, i) => {
      this._osc(freq,        'sine',     0.5,  0.30, t + i * 0.095);
      this._osc(freq * 1.5,  'sine',     0.25, 0.14, t + i * 0.095 + 0.02);
    });
    // Triumphant final chord
    [1047, 1319, 1568, 2093, 2637].forEach((freq, i) => {
      this._osc(freq, 'sine', 1.4, 0.20 - i * 0.02, t + notes.length * 0.095);
    });
    // Coin shower
    for (let i = 0; i < 16; i++) {
      this.coin(t + 0.9 + i * 0.11);
    }
    // Percussion hits
    this._noise(0.12, 0.4, 3000, 'highpass', t + notes.length * 0.095);
    this._noise(0.12, 0.3, 3000, 'highpass', t + notes.length * 0.095 + 0.25);
  }
}

const SE = new SoundEngine();

/* Segment index → degrees to rotate wheel so that segment is under pointer.
   Pointer is at top (−90° in SVG coords). Segment i midpoint is at (i+0.5)×36°−90°.
   To bring segment i to pointer: rotate CW by (i+0.5)×36° */
const SEG_DEG = i => (i + 0.5) * 36;
// midgame → landed on 400 (seg 5), bankrupt → BANKRUPT (seg 2), celebrate → 500 (seg 7)
const STATE_SEG = { midgame: 5, bankrupt: 2, celebrate: 7 };
const INIT_SPINS = 5;

/* ═══════════════════════════════════════════════════════════════════
   THEMES
═══════════════════════════════════════════════════════════════════ */
const THEMES = {
  cosmos: {
    id: 'cosmos',
    bg: 'radial-gradient(ellipse 80% 60% at 30% 20%, #1e0055 0%, #070010 55%, #000820 100%)',
    headerBg: 'rgba(168,85,247,0.12)',
    headerBorder: 'rgba(168,85,247,0.45)',
    headerText: '#ede9fe',
    subText: '#a78bfa',
    accentA: '#a855f7',
    accentB: '#f59e0b',
    accentC: '#06b6d4',
    wheelColors: [
      '#6d28d9','#4338ca','#1d4ed8','#0284c7',
      '#0e7490','#6d28d9','#4338ca','#1d4ed8',
      '#0284c7','#0e7490',
    ],
    bankruptFill: '#200000',
    bankruptText: '#ff3333',
    wheelRingFill: '#f59e0b',
    wheelStroke: 'rgba(255,255,255,0.25)',
    wheelHubOuter: '#1e0040',
    wheelHubInner: '#a855f7',
    wheelHubStar: '#ffd700',
    pointer: '#f59e0b',
    wheelGlow: '#a855f7',
    tileHiddenBg: 'rgba(168,85,247,0.06)',
    tileHiddenBorder: 'rgba(168,85,247,0.38)',
    tileRevBg: 'linear-gradient(145deg,#3b1383,#5b21b6)',
    tileRevBorder: '#a855f7',
    tileRevText: '#ede9fe',
    tileRevGlow: 'rgba(168,85,247,0.7)',
    scoreBg: 'rgba(168,85,247,0.09)',
    scoreBorder: 'rgba(168,85,247,0.45)',
    scoreName: '#c4b5fd',
    scoreCoins: '#fbbf24',
    bubbleBg: '#0d0020',
    bubbleBorder: '#a855f7',
    bubbleText: '#ede9fe',
    companionBg: 'radial-gradient(circle,#3b0f6e,#150030)',
    companionBorder: '#a855f7',

/* ═══════════════════════════════════════════════════════════════════
   WHEEL SVG
═══════════════════════════════════════════════════════════════════ */
const SEGS = ['100','200','BANKRUPT','300','FREE\nLETTER','400',COMPANION_SPINS_LABEL,'500','250','350'];

function WheelSVG({ theme, size = 270, rotation = 0, spinning = false }) {
  const n = SEGS.length;
  const step = (2 * Math.PI) / n;
  const r = size / 2 - 5;
  const cx = size / 2, cy = size / 2;

  return (
    <div
      className={`wheel-spin-wrap${spinning ? ' spinning' : ''}`}
      style={{ transform: `rotate(${rotation}deg)`, display: 'inline-block', lineHeight: 0 }}
    >
    <svg
      width={size} height={size}
      viewBox={`0 0 ${size} ${size}`}
      style={{ '--wheel-glow': theme.wheelGlow }}
    >
      {/* Outer ring */}
      <circle cx={cx} cy={cy} r={r + 4} fill={theme.wheelRingFill} />

      {SEGS.map((label, i) => {
        const a0 = i * step - Math.PI / 2;
        const a1 = (i + 1) * step - Math.PI / 2;
        const x1 = cx + r * Math.cos(a0), y1 = cy + r * Math.sin(a0);
        const x2 = cx + r * Math.cos(a1), y2 = cy + r * Math.sin(a1);
        const am = a0 + step / 2;
        const tr = r * 0.67;
        const tx = cx + tr * Math.cos(am);
        const ty = cy + tr * Math.sin(am);
        const deg = (am * 180) / Math.PI + 90;
        const isBankrupt = label === 'BANKRUPT';
        const fill = isBankrupt ? theme.bankruptFill : theme.wheelColors[i % theme.wheelColors.length];
        const lines = label.split('\n');
        const fs = label.length > 6 ? 9 : label.length > 4 ? 10 : 13;

        return (
          <g key={i}>
            <path
              d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`}
              fill={fill}
              stroke={theme.wheelStroke}
              strokeWidth={1.5}
            />
            <g transform={`translate(${tx},${ty}) rotate(${deg})`}>
              {lines.map((line, li) => (
                <text key={li}
                  x={0} y={(li - (lines.length - 1) / 2) * (fs + 2.5)}
                  textAnchor="middle" dominantBaseline="middle"
                  fontSize={fs} fontFamily="Lexend,sans-serif" fontWeight="800"
                  fill={isBankrupt ? theme.bankruptText : '#fff'}
                  style={{ textShadow: '0 1px 3px rgba(0,0,0,0.9)' }}
                >{line}</text>
              ))}
            </g>
          </g>
        );
      })}

      {/* Decorative dots on ring */}
      {Array.from({ length: n }).map((_, i) => {
        const a = i * step - Math.PI / 2;
        const dx = cx + (r + 2) * Math.cos(a);
        const dy = cy + (r + 2) * Math.sin(a);
        return <circle key={i} cx={dx} cy={dy} r={3.5} fill="#fff" opacity={0.85} />;
      })}

      {/* Hub */}
      <circle cx={cx} cy={cy} r={28} fill={theme.wheelHubOuter} />
      <circle cx={cx} cy={cy} r={19} fill={theme.wheelHubInner} />
      <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle"
        fontSize={15} fill={theme.wheelHubStar} fontFamily="Lexend,sans-serif" fontWeight="900">★</text>

      {/* Pointer */}
      <polygon
        points={`${cx - 13},4 ${cx + 13},4 ${cx},32`}
        fill={theme.pointer}
        stroke="#fff" strokeWidth={1.5}
      />
      <circle cx={cx} cy={4} r={5} fill={theme.pointer} stroke="#fff" strokeWidth={1.5} />
    </svg>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   PARTICLES (stars / fireflies / bubbles)
═══════════════════════════════════════════════════════════════════ */
function Particles({ theme, count = 28 }) {
  const isEnchanted = theme.id === 'enchanted';
  const isTreasure = theme.id === 'treasure';

  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>
      {Array.from({ length: count }).map((_, i) => {
        const x = (i * 34.7 + 5) % 100;
        const y = (i * 47.1 + 3) % 100;
        const size = i % 4 === 0 ? 5 : i % 3 === 0 ? 3 : 2;
        const delay = `${(i % 7) * 0.28}s`;
        const dur = `${2 + (i % 5) * 0.5}s`;

        if (isEnchanted) {
          return (
            <div key={i} style={{
              position: 'absolute', left: `${x}%`, top: `${y}%`,
              width: size + 2, height: size + 2,
              borderRadius: '50%',
              background: i % 2 === 0 ? '#34d399' : '#c084fc',
              opacity: 0.5,
              animation: `firefly ${dur} ease-in-out ${delay} infinite`,
            }} />
          );
        }
        if (isTreasure) {
          return (
            <div key={i} style={{
              position: 'absolute', left: `${x}%`, top: `${y}%`,
              width: size, height: size,
              borderRadius: '50%',
              background: i % 3 === 0 ? '#f59e0b' : 'rgba(255,255,255,0.4)',
              animation: `twinkle ${dur} ease-in-out ${delay} infinite`,
            }} />
          );
        }
        // cosmos: stars
        return (
          <div key={i} style={{
            position: 'absolute', left: `${x}%`, top: `${y}%`,
            width: size, height: size,
            borderRadius: '50%',
            background: i % 4 === 0 ? '#a855f7' : i % 4 === 1 ? '#06b6d4' : '#fff',
            animation: `twinkle ${dur} ease-in-out ${delay} infinite`,
          }} />
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   APP — real game state machine
═══════════════════════════════════════════════════════════════════ */
function App() {
  const theme = THEMES[THEME_ID] ?? THEMES.cosmos;

  const [revealed, setRevealed] = useState(new Set());
  const [guessedLetters, setGuessedLetters] = useState(new Set());
  const [ilaCoins, setIlaCoins] = useState(PROFILE_COMPANION_CURRENCY);
  const [companionCoins, setCompanionCoins] = useState(COMPANION_START_COINS);
  const [companionJustBankrupt, setCompanionJustBankrupt] = useState(false);
  const [wrongGuesses, setWrongGuesses] = useState(0);
  const [phase, setPhase] = useState('idle'); // idle | spinning | picking | won | lost
  const [wheelRot, setWheelRot] = useState(SEG_DEG(0)); // start with seg 0 at pointer
  const [spinning, setSpinning] = useState(false);
  const [currentValue, setCurrentValue] = useState(null);
  const [speech, setSpeech] = useState('Spin the wheel to start! 🌟');
  const [mood, setMood] = useState('happy');
  const startTime = useRef(Date.now());
  const completedRef = useRef(false);

  const isSolved = LETTERS.length > 0 && LETTERS.every((_, i) => revealed.has(i));
  const isGameOver = wrongGuesses >= 6 && !isSolved;

  const getSnapshot = useCallback((overrides = {}) => {
    const snapRevealed = overrides.revealed ?? revealed;
    const snapGuessed = overrides.guessedLetters ?? guessedLetters;
    const snapPhase = overrides.phase ?? phase;
    const snapWrong = overrides.wrongGuesses ?? wrongGuesses;
    const snapScore = overrides.score ?? ilaCoins;
    return {
      game: "Wheel of Fortune",
      phase: snapPhase,
      currentWord: WORD_RAW,
      category: CATEGORY,
      screenText: [
        "BONUS ROUND",
        THEME_ID === 'cosmos' ? "SPACE SPELLING CHALLENGE"
          : THEME_ID === 'treasure' ? "TREASURE HUNT SPELLING"
          : "ENCHANTED WORD QUEST",
        snapPhase === 'won' ? "WORD SOLVED" : "GUESS THE WORD",
        `Category: ${CATEGORY}`,
      ],
      boardState: boardStateStr(LETTERS, snapRevealed),
      visibleLetters: LETTERS.filter((_, i) => snapRevealed.has(i)),
      guessedLetters: Array.from(snapGuessed),
      wrongGuesses: snapWrong,
      maxWrongGuesses: 6,
      wheelValue: overrides.wheelValue ?? currentValue,
      score: snapScore,
      itemIndex: snapRevealed.size,
      totalItems: LETTERS.length,
      turn: snapPhase === 'picking' ? 'child' : 'companion',
      canSpin: snapPhase === 'idle' && !spinning,
      canPickLetter: snapPhase === 'picking',
      lastAction: overrides.lastAction ?? null,
      letter: overrides.letter,
      correct: overrides.correct,
    };
  }, [revealed, guessedLetters, phase, wrongGuesses, ilaCoins, currentValue, spinning]);

  // Companion heartbeat — reports board state every 5s while game is active
  useEffect(() => {
    if (!window.GameBridge || typeof window.GameBridge.startHeartbeat !== 'function') return;
    if (phase === 'won' || phase === 'lost') return;
    const hbId = window.GameBridge.startHeartbeat(
      () => `Wheel of Fortune — board: ${boardStateStr(LETTERS, revealed)} — ${LETTERS.length - revealed.size} letters left`,
      () => getSnapshot({ lastAction: 'heartbeat' })
    );
    return () => clearInterval(hbId);
  }, [phase, revealed, ilaCoins, getSnapshot]);

  // Win detection
  useEffect(() => {
    if (!isSolved || completedRef.current) return;
    completedRef.current = true;
    reportGameState(
      `Word solved! The word was "${WORD_RAW}". ` +
        `${CHILD_NAME} earned ${ilaCoins} coins total. ` +
        `${COMPANION_NAME} finished with ${companionCoins} coins. Game complete.`,
      {
        phase: "won",
        currentWord: WORD_RAW,
        boardState: boardStateStr(LETTERS, revealed),
        correct: true,
        score: ilaCoins,
        itemIndex: revealed.size,
        totalItems: LETTERS.length,
      }
    );
    SE.fanfare();
    setMood('celebrating');
    setSpeech(`WE DID IT! You solved ${WORD_RAW.toUpperCase()}! You are SO smart!! 🎉`);
    fireComp('session_complete', {});
    setPhase('won');
    setTimeout(() => {
      if (window.GameBridge && typeof window.GameBridge.awardCurrency === 'function') {
        window.GameBridge.awardCurrency(wofSessionCoinDelta(ilaCoins), 'wheel_of_fortune_win');
      }
      if (typeof window.sendNodeComplete === 'function') {
        window.sendNodeComplete({
          completed: true,
          accuracy: (6 - wrongGuesses) / 6,
          wordsCorrect: [WORD_RAW],
          wordsStruggled: [],
          flaggedWords: [],
          xpEarned: 150,
          coinsEarned: wofSessionCoinDelta(ilaCoins),
          timeSpent_ms: Date.now() - startTime.current,
          wordsAttempted: 1,
        });
      }
    }, 3500);
  }, [isSolved, ilaCoins, companionCoins]);

  // Game-over detection
  useEffect(() => {
    if (!isGameOver || completedRef.current) return;
    completedRef.current = true;
    reportGameState(
      `Game over. The word was "${WORD_RAW}". ` +
        `${CHILD_NAME} earned ${ilaCoins} coins. Better luck next time.`,
      {
        phase: "lost",
        currentWord: WORD_RAW,
        boardState: boardStateStr(LETTERS, revealed),
        correct: false,
        score: ilaCoins,
        itemIndex: revealed.size,
        totalItems: LETTERS.length,
      }
    );
    setPhase('lost');
    setSpeech(`The word was ${WORD_RAW.toUpperCase()}. We'll get it next time! 💪`);
    setTimeout(() => {
      if (window.GameBridge && typeof window.GameBridge.awardCurrency === 'function') {
        window.GameBridge.awardCurrency(wofSessionCoinDelta(ilaCoins), 'wheel_of_fortune_win');
      }
      if (typeof window.sendNodeComplete === 'function') {
        window.sendNodeComplete({
          completed: false,
          accuracy: 0,
          wordsCorrect: [],
          wordsStruggled: [WORD_RAW],
          flaggedWords: [WORD_RAW],
          xpEarned: 20,
          coinsEarned: wofSessionCoinDelta(ilaCoins),
          timeSpent_ms: Date.now() - startTime.current,
          wordsAttempted: 1,
        });
      }
    }, 2000);
  }, [isGameOver, ilaCoins]);

  const handleSpin = useCallback(() => {
    if (spinning || phase !== 'idle') return;
    reportGameAction(
      "wheel_spin_started",
      `Wheel of Fortune started. Word: ${LETTERS.length} letters. Category: ${CATEGORY}. ` +
        `${CHILD_NAME}: ${ilaCoins} coins. ${COMPANION_NAME}: ${companionCoins} coins. Spinning the wheel.`,
      getSnapshot({
        phase: "spinning",
        lastAction: "wheel_spin_started",
        score: ilaCoins,
      })
    );
    setCompanionJustBankrupt(false);
    SE.spinWhoosh();
    setSpinning(true);
    setPhase('spinning');

    const segIdx = Math.floor(Math.random() * SEGS.length);
    const fullSpins = 5 + Math.floor(Math.random() * 3);
    // Calculate delta so wheel lands exactly on segIdx
    const desiredMod = SEG_DEG(segIdx);
    const currentMod = wheelRot % 360;
    let delta = desiredMod - currentMod;
    if (delta <= 0) delta += 360;
    setWheelRot(prev => prev + fullSpins * 360 + delta);

    SE.spinSequence(3.2, () => {
      setSpinning(false);
      const segLabel = SEGS[segIdx];
      const labelLine = String(segLabel).replace(/\n/g, " ");
      reportGameAction(
        "wheel_landed",
        `Wheel landed on: ${labelLine}. ` +
          `${wheelLandDescription(segLabel)} ` +
          `Tiles revealed: ${revealed.size} of ${LETTERS.length}.`,
        getSnapshot({
          phase: "picking",
          wheelValue: labelLine,
          lastAction: "wheel_landed",
          score: ilaCoins,
        })
      );

      if (segLabel === 'BANKRUPT') {
        SE.bankrupt();
        setCompanionCoins(0);
        setCompanionJustBankrupt(true);
        setMood('shocked');
        setSpeech('OH NO! I lost ALL my coins! But yours are SAFE — keep going!');
        setTimeout(() => {
          setCompanionJustBankrupt(false);
          setMood('happy');
          setSpeech('Your turn again! Spin the wheel! 🌟');
          setPhase('idle');
        }, 2200);

      } else if (segLabel === 'FREE\nLETTER') {
        const unrevealed = LETTERS.map((l, i) => ({ l, i })).filter(({ i }) => !revealed.has(i));
        if (unrevealed.length > 0) {
          const counts = {};
          unrevealed.forEach(({ l }) => { counts[l] = (counts[l] || 0) + 1; });
          const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
          const newReveal = new Set(revealed);
          let earned = 0;
          LETTERS.forEach((l, i) => {
            if (l === best && !revealed.has(i)) { newReveal.add(i); earned += 100; }
          });
          setRevealed(newReveal);
          setIlaCoins(c => c + earned);
          setGuessedLetters(g => new Set([...g, best]));
          SE.letterReveal();
          fireComp('correct_answer', {});
          setSpeech(`FREE LETTER! ${best} is in the word! 🎁`);
          reportGameAction(
            "letter_revealed",
            `Letter "${best}" is correct! (FREE LETTER) Tile revealed. ` +
              `${newReveal.size} of ${LETTERS.length} letters found. ` +
              `${CHILD_NAME} has ${ilaCoins + earned} coins.`,
            getSnapshot({
              phase: "idle",
              revealed: newReveal,
              guessedLetters: new Set([...guessedLetters, best]),
              letter: best,
              correct: true,
              lastAction: "letter_revealed",
              score: ilaCoins + earned,
            })
          );
        } else {
          setSpeech('No letters left to reveal! Spin again! 🌟');
        }
        setPhase('idle');

      } else if (segLabel === COMPANION_SPINS_LABEL) {
        setSpeech(COMPANION_NAME + " is thinking... 🤔");
        setTimeout(() => {
          const unguessed = ALPHABET.filter(l => !guessedLetters.has(l));
          const inWord = unguessed.filter(l => LETTERS.includes(l));
          const pick = inWord.length > 0
            ? inWord[Math.floor(Math.random() * inWord.length)]
            : unguessed[Math.floor(Math.random() * unguessed.length)];
          setSpeech(`${COMPANION_NAME} picks... ${pick}! Let's see! 🤞`);
          const newReveal = new Set(revealed);
          let earned = 0;
          let found = false;
          LETTERS.forEach((l, i) => {
            if (l === pick && !revealed.has(i)) { newReveal.add(i); earned += 100; found = true; }
          });
          setGuessedLetters(g => new Set([...g, pick]));
          if (found) {
            setRevealed(newReveal);
            setIlaCoins(c => c + earned);
            SE.letterReveal();
            fireComp('correct_answer', {});
            setSpeech(`Yes! ${pick} is there! Great teamwork! 🌟`);
            reportGameAction(
              "letter_revealed",
              `${COMPANION_NAME} picked letter "${pick}" — it is in the word. ` +
                `Letter "${pick}" is correct! ` +
                `${newReveal.size} of ${LETTERS.length} letters found. ${CHILD_NAME} has ${ilaCoins + earned} coins.`,
              getSnapshot({
                phase: "idle",
                revealed: newReveal,
                guessedLetters: new Set([...guessedLetters, pick]),
                letter: pick,
                correct: true,
                lastAction: "letter_revealed",
                score: ilaCoins + earned,
              })
            );
          } else {
            SE.buttonTap();
            fireComp('wrong_answer', {});
            setWrongGuesses(w => w + 1);
            setSpeech(`No ${pick} this time. Keep going! 💪`);
            reportGameAction(
              "wrong_letter",
              `${COMPANION_NAME} picked letter "${pick}" — not in the word. No tiles revealed. Wrong guess counted.`,
              getSnapshot({
                phase: "idle",
                guessedLetters: new Set([...guessedLetters, pick]),
                wrongGuesses: wrongGuesses + 1,
                letter: pick,
                correct: false,
                lastAction: "wrong_letter",
                score: ilaCoins,
              })
            );
          }
          setPhase('idle');
        }, 1500);

      } else {
        const coins = COIN_VALUES[segLabel] ?? 200;
        setCurrentValue(coins);
        setPhase('picking');
        setSpeech(`You landed on ${coins}! Pick a letter! 🎯`);
        setMood('happy');
      }
    });
  }, [spinning, phase, revealed, guessedLetters, wrongGuesses, wheelRot, ilaCoins, companionCoins, getSnapshot]);

  useEffect(() => {
    function onMessage(event) {
      const msg = event.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type !== 'wheel_spin') return;
      handleSpin();
    }
    window.addEventListener('message', onMessage);
    return () => window.removeEventListener('message', onMessage);
  }, [handleSpin]);

  const handleLetterPick = useCallback((letter) => {
    letter = String(letter || '').toUpperCase().charAt(0);
    if (!ALPHABET.includes(letter)) return;
    if (phase !== 'picking') {
      reportGameAction(
        "letter_attempt_ignored",
        `Letter attempt ignored: "${letter}" was entered, but the game is not waiting for a letter.`,
        getSnapshot({
          letter: letter,
          lastAction: 'letter_attempt_ignored',
        })
      );
      return;
    }
    const nextGuessedLetters = new Set([...guessedLetters, letter]);
    setGuessedLetters(nextGuessedLetters);
    const newReveal = new Set(revealed);
    let count = 0;
    LETTERS.forEach((l, i) => {
      if (l === letter && !revealed.has(i)) { newReveal.add(i); count++; }
    });
    if (count > 0) {
      const newIla = ilaCoins + (currentValue ?? 200) * count;
      setRevealed(newReveal);
      setIlaCoins(c => c + (currentValue ?? 200) * count);
      SE.letterReveal();
      fireComp('correct_answer', {});
      setSpeech(`Yes! ${letter} is in there${count > 1 ? ' ' + count + ' times' : ''}! 🎉`);
      reportGameAction(
        "letter_revealed",
        `Letter "${letter}" is correct! Tile revealed. ` +
          `${newReveal.size} of ${LETTERS.length} letters found. ` +
          `${CHILD_NAME} has ${newIla} coins.`,
        getSnapshot({
          phase: "idle",
          revealed: newReveal,
          guessedLetters: nextGuessedLetters,
          letter: letter,
          correct: true,
          lastAction: "letter_revealed",
          score: newIla,
        })
      );
    } else {
      SE.buttonTap();
      fireComp('wrong_answer', {});
      const nextWrongGuesses = wrongGuesses + 1;
      setWrongGuesses(nextWrongGuesses);
      setSpeech(`No ${letter} this time. Keep trying! 💪`);
      reportGameAction(
        "wrong_letter",
        `Letter "${letter}" is not in the word. No tiles revealed. ` +
          `${LETTERS.length - revealed.size} of ${LETTERS.length} letter positions still hidden.`,
        getSnapshot({
          phase: "idle",
          guessedLetters: nextGuessedLetters,
          wrongGuesses: nextWrongGuesses,
          letter: letter,
          correct: false,
          lastAction: "wrong_letter",
          score: ilaCoins,
        })
      );
    }
    setPhase('idle');
    setCurrentValue(null);
  }, [phase, revealed, guessedLetters, wrongGuesses, currentValue, ilaCoins, getSnapshot]);

  useEffect(() => {
    function onKeyDown(event) {
      const target = event.target;
      const tag = target && target.tagName ? String(target.tagName).toLowerCase() : "";
      if (tag === "input" || tag === "textarea" || tag === "select") return;
      const key = String(event.key || "").toUpperCase();
      if (!/^[A-Z]$/.test(key)) return;
      event.preventDefault();
      handleLetterPick(key);
    }
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, [handleLetterPick]);

  const isCelebrate = phase === 'won';
  const isBankrupt = companionJustBankrupt;
  const isLost = phase === 'lost';
  const spinBtnDisabled = spinning || phase !== 'idle';
  const spinColor = isBankrupt ? '#ff3333' : isCelebrate ? theme.accentA : theme.accentB;
  const headerBadge = isBankrupt ? 'BANKRUPT!'
    : isCelebrate ? '🏆 SOLVED!'
    : isLost ? '💀 GAME OVER'
    : phase === 'picking' ? `🎯 ${currentValue} — Pick!`
    : '🎡 Spin!';
  const revealedArr = Array.from(revealed);
  const companionBusy = spinning || phase === 'spinning';
  const isChildLetterTurn = phase === 'picking';

  return (
    <div style={{
      position: 'fixed', inset: 0,
      background: theme.bg,
      fontFamily: 'Lexend,sans-serif',
      overflow: 'hidden',
    }}>
      <Particles theme={theme} count={28} />

      {/* Bankrupt flash overlay */}
      {isBankrupt && (
        <div style={{
          position:'absolute', inset:0, pointerEvents:'none', zIndex:1,
          animation:'bankruptFlash 0.7s ease-in-out infinite',
          boxShadow:'inset 0 0 60px rgba(220,0,0,0.35)',
        }}/>
      )}

      {isCelebrate && <CoinRain />}
      {isCelebrate && (
        <div style={{
          position:'absolute', inset:0, pointerEvents:'none', zIndex:1,
          boxShadow:`inset 0 0 80px ${theme.companionGlow}44`,
          animation:'pulseGlow 1s ease-in-out infinite',
        }}/>
      )}

      {/* ── HEADER ── */}
      <div style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'11px 20px',
        background: theme.headerBg,
        borderBottom:`2px solid ${theme.headerBorder}`,
        position:'relative', zIndex:5,
      }}>
        <div>
          <div style={{fontSize:22, fontWeight:900, color:theme.headerText, letterSpacing:3}}>
            {theme.emoji} BONUS ROUND
          </div>
          <div style={{fontSize:15, fontWeight:500, color:theme.subText, letterSpacing:1.5}}>
            {THEME_ID==='cosmos' ? 'SPACE SPELLING CHALLENGE'
           : THEME_ID==='treasure' ? 'TREASURE HUNT SPELLING'
           : 'ENCHANTED WORD QUEST'}
          </div>
        </div>
        <div style={{
          padding:'7px 18px',
          background: isBankrupt ? 'rgba(220,0,0,0.2)' : isCelebrate ? `${theme.accentA}22` : 'transparent',
          border:`2.5px solid ${spinColor}`,
          borderRadius:12, fontSize:20, fontWeight:800, color:spinColor,
          animation:(isBankrupt||isCelebrate)?'pulseGlow 0.7s ease-in-out infinite':undefined,
          letterSpacing:1,
        }}>
          {headerBadge}
        </div>
      </div>

      {/* ── BODY ── */}
      <div style={{
        display:'flex',
        height:'calc(100% - 62px)',
        position:'relative', zIndex:3,
      }}>
        {/* LEFT: Wheel + button + scores */}
        <div style={{
          width:310, flexShrink:0,
          display:'flex', flexDirection:'column', alignItems:'center',
          padding:'10px 10px 6px', gap:8,
        }}>
          <div style={{
            filter: isBankrupt
              ? 'drop-shadow(0 0 20px #ff0000)'
              : `drop-shadow(0 0 14px ${theme.wheelGlow}88)`,
          }}>
            <WheelSVG theme={theme} size={248} rotation={wheelRot} spinning={spinning} />
          </div>

          <div
            onClick={spinBtnDisabled ? undefined : handleSpin}
            style={{
              '--btn-glow': spinColor,
              width:'88%', padding:'10px 0',
              background: spinBtnDisabled ? 'rgba(255,255,255,0.06)' : `${spinColor}22`,
              border:`2.5px solid ${spinBtnDisabled ? 'rgba(255,255,255,0.2)' : spinColor}`,
              borderRadius:13,
              fontSize:20, fontWeight:900, fontFamily:'Lexend,sans-serif',
              color: spinBtnDisabled ? 'rgba(255,255,255,0.4)' : spinColor,
              textAlign:'center', cursor: spinBtnDisabled ? 'default' : 'pointer',
              userSelect:'none', letterSpacing:1,
              animation: !spinBtnDisabled ? 'spinBtnPulse 2s ease-in-out infinite' : undefined,
              transition:'all 0.2s',
            }}
          >{spinning ? '⏳ Spinning…' : isCelebrate ? '🎊 Solved!' : isLost ? '💀 Game Over' : '🎡  SPIN!'}</div>

          <CompanionSpeechBubble theme={theme} speech={speech} />

          <div style={{display:'flex', gap:8, width:'100%', justifyContent:'center'}}>
            <ScoreCard name={CHILD_NAME}  emoji="⭐" coins={ilaCoins}  bankrupt={false}      theme={theme}/>
            <ScoreCard name={COMPANION_NAME} emoji="🌟" coins={companionCoins} bankrupt={isBankrupt} theme={theme}/>
          </div>
        </div>

        {/* RIGHT: Puzzle */}
        <div style={{
          flex:1,
          display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:'14px 24px', gap:14,
          borderLeft:`1px solid ${theme.headerBorder}`,
          overflowY:'auto',
        }}>
          <div style={{fontSize:18, fontWeight:600, color:theme.subText, letterSpacing:2, textTransform:'uppercase'}}>
            {isCelebrate ? '🏆 Word Solved!' : '🔤 Guess the word'}
          </div>

          {isCelebrate
            ? <CelebrationBanner letters={LETTERS} theme={theme}/>
            : <TileRow letters={LETTERS} revealed={revealedArr} theme={theme} celebrate={false}/>
          }

          {!isCelebrate && !isLost && (
            <div style={{
              padding:'6px 18px',
              background:`${theme.accentA}12`,
              border:`1.5px solid ${theme.accentA}44`,
              borderRadius:8, fontSize:18, fontWeight:500,
              color:theme.accentA, letterSpacing:1,
            }}>Category: {CATEGORY}</div>
          )}

          {!isCelebrate && !isLost && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'center', width: '100%' }}>
              <div
                className={isChildLetterTurn ? 'turn-banner-child' : ''}
                style={{
                  width: '100%',
                  maxWidth: 520,
                  textAlign: 'center',
                  padding: '12px 18px',
                  borderRadius: 14,
                  fontSize: 20,
                  fontWeight: 800,
                  fontFamily: 'Lexend,sans-serif',
                  letterSpacing: 0.5,
                  lineHeight: 1.35,
                  border: isChildLetterTurn
                    ? '2.5px solid rgba(34,197,94,0.95)'
                    : companionBusy
                      ? `2px solid ${theme.accentB}88`
                      : '2px solid rgba(255,255,255,0.2)',
                  background: isChildLetterTurn
                    ? 'rgba(22,101,52,0.55)'
                    : companionBusy
                      ? 'rgba(30,27,75,0.85)'
                      : 'rgba(255,255,255,0.06)',
                  color: isChildLetterTurn ? '#ecfccb' : companionBusy ? theme.subText : 'rgba(255,255,255,0.85)',
                }}
              >
                {isChildLetterTurn
                  ? 'YOUR TURN — pick a letter!'
                  : companionBusy
                    ? `${COMPANION_NAME} is spinning…`
                    : 'Your turn — spin the wheel!'}
              </div>
              <div style={{ fontSize: 15, fontWeight: 600, color: theme.subText }}>
                {isChildLetterTurn ? 'Letters are live — tap one or press a key.' : 'Letters are dimmed until it is your pick.'}
              </div>
              <LetterBank
                theme={theme}
                guessedLetters={guessedLetters}
                onPick={handleLetterPick}
                childTurn={isChildLetterTurn}
              />
            </div>
          )}

          {isBankrupt && (
            <div style={{
              padding:'14px 22px',
              background:'rgba(255,0,0,0.1)',
              border:'2px solid rgba(255,80,80,0.4)',
              borderRadius:14, fontSize:19, fontWeight:700,
              color:'#fca5a5', textAlign:'center', maxWidth:350, lineHeight:1.5,
            }}>
              {`💪 Your coins are SAFE! Only ${COMPANION_NAME} lost theirs. You've got this!`}
            </div>
          )}

          {wrongGuesses > 0 && !isCelebrate && !isLost && (
            <div style={{fontSize:16, color:theme.subText, opacity:0.7}}>
              Wrong guesses: {wrongGuesses} / 6
            </div>
          )}

          {isLost && (
            <div style={{
              padding:'14px 22px',
              background:'rgba(0,0,0,0.3)',
              border:`2px solid ${theme.accentA}44`,
              borderRadius:14, fontSize:19, fontWeight:700,
              color:theme.accentA, textAlign:'center',
            }}>
              The word was: <span style={{color:theme.accentB}}>{WORD_RAW.toUpperCase()}</span>
            </div>
          )}
        </div>
      </div>

      {/* ── ELLI ── */}
      <CompanionPortrait theme={theme} mood={mood} companionSpinning={companionBusy} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
