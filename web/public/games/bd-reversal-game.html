<!DOCTYPE html>
<html lang="en">
<head>
<script src="_contract.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B / D Reversal — Project Sunny</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #12002e;
    min-height: 100vh;
    font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
    color: #d0b8ff;
    overflow-x: hidden;
    position: relative;
  }
  #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: tw var(--d,2s) var(--dl,0s) infinite alternate ease-in-out;
  }
  @keyframes tw { from { opacity: 0.15; transform: scale(0.7); } to { opacity: 0.9; transform: scale(1.2); } }

  .wrap {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto; padding: 14px;
    display: flex; flex-direction: column; gap: 12px; align-items: center;
  }
  .title {
    font-size: 22px; font-weight: 900; color: #FFD93D;
    text-shadow: 0 2px 0 #8a6a00; letter-spacing: 0.04em; text-align: center;
  }
  .sub { font-size: 11px; color: #9f8fdd; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }

  .hud {
    display: flex; justify-content: space-between; width: 100%;
    background: #1e0848; border: 2px solid #534AB7; border-radius: 12px; padding: 8px 14px;
  }
  .hud span { font-size: 12px; font-weight: 800; color: #FFD93D; }

  .stage {
    width: 100%; min-height: 280px;
    background: #050010; border: 2px solid #1a0848;
    border-radius: 14px; box-shadow: 0 0 24px #7F77DD22;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 16px; position: relative;
  }

  /* Round 1 — BED mnemonic */
  .bed-scene { width: 100%; max-width: 360px; height: 200px; position: relative; }
  .bed-frame {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 280px; height: 80px; background: linear-gradient(180deg, #3C3489, #1e0848);
    border-radius: 8px 8px 4px 4px; border: 3px solid #7F77DD;
  }
  .pillow {
    position: absolute; bottom: 88px; width: 44px; height: 28px;
    background: #AFA9EC; border-radius: 8px; border: 2px solid #534AB7;
  }
  .pillow.left { left: calc(50% - 130px); animation: bobL 2.2s ease-in-out infinite; }
  .pillow.right { right: calc(50% - 130px); animation: bobR 2.2s ease-in-out infinite; }
  @keyframes bobL { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-4px); } }
  @keyframes bobR { 0%,100% { transform: translateX(0); } 50% { transform: translateX(4px); } }

  .big-letter {
    position: absolute; font-size: 72px; font-weight: 900; line-height: 1;
    text-shadow: 0 0 20px currentColor;
  }
  .big-letter.b-char { left: 8%; bottom: 100px; color: #7F77DD; animation: pulseB 2s ease-in-out infinite; }
  .big-letter.d-char { right: 8%; bottom: 100px; color: #9FE1CB; animation: pulseD 2s ease-in-out infinite; }
  @keyframes pulseB { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  @keyframes pulseD { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

  .bed-label {
    position: absolute; bottom: 0; width: 100%; text-align: center;
    font-size: 13px; font-weight: 800; color: #b89dff;
  }
  .bed-label strong { color: #FFD93D; }

  .flash-letter {
    font-size: clamp(80px, 28vw, 140px); font-weight: 900;
    color: #FFD93D; text-shadow: 0 0 30px #FFD93D88;
    animation: pop 0.35s ease-out;
  }
  @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .flash-word {
    font-size: clamp(36px, 12vw, 56px); font-weight: 900; color: #fff;
    letter-spacing: 0.06em; text-transform: uppercase;
    animation: pop 0.35s ease-out;
  }

  .prompt { font-size: 15px; font-weight: 800; color: #9FE1CB; text-align: center; margin-bottom: 8px; }

  .choices {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 12px;
  }
  .choice {
    min-width: 100px; padding: 16px 28px; font-size: 28px; font-weight: 900;
    border: none; border-radius: 14px; cursor: pointer; font-family: inherit;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.35);
  }
  .choice:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.35); }
  .choice-b { background: #7F77DD; color: #fff; border: 3px solid #AFA9EC; }
  .choice-d { background: #1D9E75; color: #fff; border: 3px solid #9FE1CB; }
  .choice:disabled { opacity: 0.5; cursor: default; }

  .next-btn {
    margin-top: 14px; padding: 12px 28px; background: #FFD93D; color: #12002e;
    border: none; border-radius: 10px; font-weight: 900; font-size: 15px; cursor: pointer;
    box-shadow: 0 4px 0 #8a6a00;
  }
  .next-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a6a00; }

  .elli-bubble {
    width: 100%; background: #1e0848; border: 2px solid #534AB7; border-radius: 12px;
    padding: 10px 14px; font-size: 13px; font-style: italic; min-height: 44px;
    animation: bp 4s ease-in-out infinite;
  }
  @keyframes bp { 0%,100% { border-color: #534AB7; } 50% { border-color: #7F77DD; } }
  .elli-bubble strong { color: #FFD93D; font-style: normal; }

  .timer-bar { height: 6px; background: #2a0a5e; border-radius: 3px; overflow: hidden; width: 100%; margin-top: 8px; }
  .timer-fill { height: 100%; background: #7F77DD; transition: width 0.05s linear; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="sunny-companion" style="position:fixed;bottom:20px;right:20px;width:120px;height:120px;z-index:9999;pointer-events:none;"></div>
<div id="starfield"></div>
<div class="wrap">
  <div class="title">B / D Reversal</div>
  <div class="sub" id="player-label">Letter friends</div>
  <div class="hud">
    <span>Round <b id="round-num">1</b>/4</span>
    <span>Score <b id="score-num">0</b></span>
  </div>

  <div class="stage" id="stage">
    <div id="r1" class="bed-scene">
      <div class="big-letter b-char">b</div>
      <div class="big-letter d-char">d</div>
      <div class="bed-frame"></div>
      <div class="pillow left"></div>
      <div class="pillow right"></div>
      <div class="bed-label"><strong>B</strong> faces the <strong>headboard</strong> (left) ·
        <strong>D</strong> faces the <strong>footboard</strong> (right) — spell <strong>BED</strong>!</div>
    </div>
    <div id="r234" class="hidden" style="width:100%;text-align:center;">
      <div class="prompt" id="quiz-prompt">What letter?</div>
      <div id="quiz-target"></div>
      <div class="timer-bar hidden" id="timer-wrap"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
      <div class="choices" id="choices">
        <button type="button" class="choice choice-b" id="btn-b">B</button>
        <button type="button" class="choice choice-d" id="btn-d">D</button>
      </div>
    </div>
    <button type="button" class="next-btn hidden" id="btn-next">Continue</button>
  </div>

  <div class="elli-bubble" id="elli">
    <strong id="companion-name">SUNNY</strong> — Waiting for Sunny to start…
  </div>
</div>

<script>
(function () {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 1;
    s.style.cssText = 'left:' + (Math.random() * 100) + '%;top:' + (Math.random() * 100) + '%;width:' + sz + 'px;height:' + sz + 'px;--d:' + (1.5 + Math.random() * 2.5) + 's;--dl:' + (Math.random() * 2) + 's';
    sf.appendChild(s);
  }

  function postToParent(data) {
    try { window.parent.postMessage(data, '*'); } catch (e) {}
  }

  const AC = window.AudioContext || window.webkitAudioContext;
  let actx;
  function getCtx() {
    if (!actx) actx = new AC();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(freq, type, dur, vol, delay) {
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, c.currentTime + (delay || 0));
      g.gain.linearRampToValueAtTime(vol || 0.12, c.currentTime + (delay || 0) + 0.01);
      g.gain.linearRampToValueAtTime(0, c.currentTime + (delay || 0) + (dur || 0.08));
      o.start(c.currentTime + (delay || 0));
      o.stop(c.currentTime + (delay || 0) + (dur || 0.1));
    } catch (e) {}
  }
  function playTap() { tone(660, 'square', 0.06, 0.12); tone(880, 'square', 0.05, 0.08, 0.04); }
  function playWrong() {
    try {
      const c = getCtx();
      const buf = c.createBuffer(1, c.sampleRate * 0.2, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const src = c.createBufferSource();
      const g = c.createGain();
      src.buffer = buf;
      src.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(0.25, c.currentTime);
      g.gain.linearRampToValueAtTime(0, c.currentTime + 0.2);
      src.start();
    } catch (e) {}
  }
  function playLevel() { [523, 659, 784].forEach(function (f, i) { tone(f, 'square', 0.12, 0.18, i * 0.08); }); }
  function playVictory() { [523, 659, 784, 1047].forEach(function (f, i) { tone(f, 'square', 0.14, 0.2, i * 0.1); }); }

  let musicIv = null;
  const bass = [110, 110, 138, 146, 138];
  let bi = 0;
  function startMusic() {
    stopMusic();
    musicIv = setInterval(function () {
      tone(bass[bi % bass.length], 'square', 0.1, 0.05);
      bi++;
    }, 240);
  }
  function stopMusic() {
    if (musicIv) { clearInterval(musicIv); musicIv = null; }
  }

  let childName = 'friend';
  let companionName = 'Sunny';
  let probeWords = ['bed', 'dog', 'big', 'duck', 'bird', 'dab', 'bad', 'dig'];
  if (window.GAME_PARAMS && Array.isArray(window.GAME_PARAMS.words) && window.GAME_PARAMS.words.length) {
    probeWords = window.GAME_PARAMS.words.map(function (w) { return String(w); });
  }
  let bdWords = [];

  let round = 1;
  let score = 0;
  let total = 0;
  let correct = 0;
  const mistakes = [];

  let trialIdx = 0;
  let trials = [];
  let currentCorrect = 'b';
  let currentDisplay = '';
  let isWordTrial = false;
  let respondBy = 0;
  let timerRaf = null;
  let speedMs = 3500;
  let answerLocked = false;

  const el = {
    r1: document.getElementById('r1'),
    r234: document.getElementById('r234'),
    quizPrompt: document.getElementById('quiz-prompt'),
    quizTarget: document.getElementById('quiz-target'),
    choices: document.getElementById('choices'),
    btnB: document.getElementById('btn-b'),
    btnD: document.getElementById('btn-d'),
    btnNext: document.getElementById('btn-next'),
    roundNum: document.getElementById('round-num'),
    scoreNum: document.getElementById('score-num'),
    elli: document.getElementById('elli'),
    playerLabel: document.getElementById('player-label'),
    timerWrap: document.getElementById('timer-wrap'),
    timerFill: document.getElementById('timer-fill'),
  };

  function setCompanionName(name) {
    companionName = String(name || 'Sunny');
    document.getElementById('companion-name').textContent = companionName.toUpperCase();
  }

  function setElli(html) {
    el.elli.innerHTML = '<strong id="companion-name">' + companionName.toUpperCase() + '</strong> — ' + html;
  }

  function filterBdWords(words) {
    const out = [];
    words.forEach(function (w) {
      const t = String(w).trim();
      if (!t) return;
      const c = t[0].toLowerCase();
      if (c === 'b' || c === 'd') out.push(t.toLowerCase());
    });
    return out;
  }

  window.addEventListener('message', function (e) {
    const msg = e.data;
    if (!msg || msg.type !== 'start') return;
    childName = msg.childName || 'friend';
    setCompanionName(msg.companionName || 'Sunny');
    const cfg = msg.config || {};
    if (Array.isArray(cfg.probeWords) && cfg.probeWords.length) {
      probeWords = cfg.probeWords.map(function (w) { return String(w); });
    }
    bdWords = filterBdWords(probeWords);
    if (bdWords.length === 0) bdWords = ['bed', 'dog', 'big', 'duck'];

    el.playerLabel.textContent = 'Team ' + childName;
    round = 1;
    score = 0;
    total = 0;
    correct = 0;
    mistakes.length = 0;
    stopMusic();
    startMusic();
    showRound1();
    setElli('B faces the headboard, D faces the footboard — like the word <strong>BED</strong>!');
  });

  function showRound1() {
    el.roundNum.textContent = '1';
    el.r1.classList.remove('hidden');
    el.r234.classList.add('hidden');
    el.btnNext.classList.remove('hidden');
    el.btnNext.textContent = 'Got it — start practice!';
    el.btnNext.onclick = function () {
      playLevel();
      round = 2;
      el.btnNext.classList.add('hidden');
      startRound2();
    };
  }

  function buildLetterTrials(n) {
    const arr = [];
    for (let i = 0; i < n; i++) {
      arr.push({ kind: 'letter', value: Math.random() < 0.5 ? 'b' : 'd' });
    }
    return arr;
  }

  function buildWordTrials(n) {
    const arr = [];
    for (let i = 0; i < n; i++) {
      const w = bdWords[Math.floor(Math.random() * bdWords.length)];
      arr.push({ kind: 'word', value: w });
    }
    return arr;
  }

  function buildMixedTrials(n) {
    const arr = [];
    for (let i = 0; i < n; i++) {
      if (Math.random() < 0.45) {
        arr.push({ kind: 'letter', value: Math.random() < 0.5 ? 'b' : 'd' });
      } else {
        const w = bdWords[Math.floor(Math.random() * bdWords.length)];
        arr.push({ kind: 'word', value: w });
      }
    }
    return arr;
  }

  function startRound2() {
    el.roundNum.textContent = '2';
    el.r1.classList.add('hidden');
    el.r234.classList.remove('hidden');
    trials = buildLetterTrials(8);
    trialIdx = 0;
    speedMs = 4000;
    el.timerWrap.classList.add('hidden');
    setElli('Tap <strong>B</strong> or <strong>D</strong> — which letter do you see?');
    nextTrial();
  }

  function startRound3() {
    el.roundNum.textContent = '3';
    trials = buildWordTrials(8);
    trialIdx = 0;
    speedMs = 4500;
    el.timerWrap.classList.remove('hidden');
    setElli('Does this word start with <strong>B</strong> or <strong>D</strong>?');
    nextTrial();
  }

  function startRound4() {
    el.roundNum.textContent = '4';
    trials = buildMixedTrials(12);
    trialIdx = 0;
    speedMs = 2200;
    el.timerWrap.classList.remove('hidden');
    setElli('Speed round — stay sharp! ⚡');
    nextTrial();
  }

  function clearTimer() {
    if (timerRaf) {
      cancelAnimationFrame(timerRaf);
      timerRaf = null;
    }
  }

  function nextTrial() {
    clearTimer();
    if (trialIdx >= trials.length) {
      endOfRound();
      return;
    }
    const t = trials[trialIdx];
    isWordTrial = t.kind === 'word';
    if (isWordTrial) {
      currentDisplay = t.value;
      currentCorrect = t.value[0].toLowerCase();
      el.quizPrompt.textContent = 'Starts with B or D?';
      el.quizTarget.innerHTML = '<div class="flash-word">' + escapeHtml(t.value.toUpperCase()) + '</div>';
    } else {
      currentDisplay = t.value;
      currentCorrect = t.value;
      el.quizPrompt.textContent = 'Which letter?';
      el.quizTarget.innerHTML = '<div class="flash-letter">' + t.value.toUpperCase() + '</div>';
    }
    el.btnB.disabled = false;
    el.btnD.disabled = false;

    if (!el.timerWrap.classList.contains('hidden')) {
      respondBy = performance.now() + speedMs;
      function tick() {
        const left = respondBy - performance.now();
        if (left <= 0) {
          el.timerFill.style.width = '0%';
          onAnswer(''); // timeout = wrong
          return;
        }
        el.timerFill.style.width = (left / speedMs * 100) + '%';
        timerRaf = requestAnimationFrame(tick);
      }
      timerRaf = requestAnimationFrame(tick);
    }
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function onAnswer(chosen) {
    if (answerLocked) return;
    answerLocked = true;
    clearTimer();
    el.btnB.disabled = true;
    el.btnD.disabled = true;

    total++;
    const c = currentCorrect;
    const ok = chosen === c;
    if (ok) {
      correct++;
      score += isWordTrial ? 15 : 10;
      playTap();
    } else {
      playWrong();
      mistakes.push({
        word: isWordTrial ? currentDisplay : currentDisplay,
        chosen: chosen || '(timeout)',
        correct: c,
      });
    }
    el.scoreNum.textContent = String(score);
    trialIdx++;
    setTimeout(function () {
      answerLocked = false;
      nextTrial();
    }, ok ? 280 : 520);
  }

  el.btnB.onclick = function () { onAnswer('b'); };
  el.btnD.onclick = function () { onAnswer('d'); };

  function endOfRound() {
    clearTimer();
    el.quizTarget.innerHTML = '';
    el.quizPrompt.textContent = '';
    el.timerWrap.classList.add('hidden');
    if (round === 2) {
      playLevel();
      round = 3;
      startRound3();
      return;
    }
    if (round === 3) {
      playLevel();
      round = 4;
      startRound4();
      return;
    }
    if (round === 4) {
      finishGame();
    }
  }

  function finishGame() {
    stopMusic();
    const accuracy = total > 0 ? correct / total : 0;
    const masteredBD = accuracy >= 0.85 && mistakes.length <= 2;
    playVictory();
    setElli('You finished! Accuracy <strong>' + Math.round(accuracy * 100) + '%</strong>' +
      (masteredBD ? ' — you are rocking B and D! 🌟' : ' — keep practicing; you are getting there! 💪'));
    sendNodeComplete({
      completed: true,
      accuracy: accuracy,
      flaggedWords: mistakes.slice(),
      xpEarned: score,
      timeSpent_ms: 0,
      score: score,
      mistakes: mistakes,
      masteredBD: masteredBD,
    });
    el.r234.innerHTML = '<p style="font-size:18px;font-weight:800;color:#9FE1CB;text-align:center;padding:24px;">All rounds complete!<br><span style="color:#FFD93D">Score: ' + score + '</span></p>';
  }
})();
</script>
</body>
</html>
